<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop Garden</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fff7f0;
        --bg2: #ffeede;
        --surf: #ffffff;
        --card: #fff3ea;
        --bdr: #ffd9c2;
        --bdr-soft: #ffe6d6;
        --peach: #ff9d76;
        --coral: #ff8a8a;
        --yel: #ffcb66;
        --mint: #7fd8a8;
        --purp: #c7a8f0;
        --blue: #88c8f0;
        --pink: #ffaecf;
        --txt: #5a4a42;
        --txt-soft: #7a6a60;
        --muted: #b3a097;
        --err: #ff7a8a;
        --ui: "Baloo 2", cursive;
        --body: "Nunito", sans-serif;
        --mono: "Fira Code", monospace;
        --r: 14px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--body);
        background: var(--bg);
        background-image:
          radial-gradient(
            circle at 12% 18%,
            rgba(255, 174, 207, 0.16) 0,
            transparent 38%
          ),
          radial-gradient(
            circle at 88% 12%,
            rgba(136, 200, 240, 0.16) 0,
            transparent 36%
          ),
          radial-gradient(
            circle at 50% 95%,
            rgba(199, 168, 240, 0.13) 0,
            transparent 42%
          );
        background-attachment: fixed;
        color: var(--txt);
        padding: 0 12px 80px;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      /* ── DEKORASI PEMANDANGAN ── */
      /* lapisan langit + awan (fixed di belakang konten) */
      .sky-deco {
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        overflow: hidden;
      }
      .cloud {
        position: absolute;
        opacity: 0.85;
        animation: drift linear infinite;
      }
      .cloud.c1 {
        top: 60px;
        left: -160px;
        width: 130px;
        animation-duration: 70s;
      }
      .cloud.c2 {
        top: 140px;
        left: -220px;
        width: 90px;
        animation-duration: 95s;
        animation-delay: -30s;
        opacity: 0.7;
      }
      .cloud.c3 {
        top: 30px;
        left: -200px;
        width: 110px;
        animation-duration: 110s;
        animation-delay: -60s;
        opacity: 0.6;
      }
      @keyframes drift {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(calc(100vw + 260px));
        }
      }

      /* rerumputan + pepohonan menempel di dasar layar */
      .ground-deco {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 150px;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
      }
      .ground-deco svg {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      @media (max-width: 620px) {
        .ground-deco {
          height: 110px;
        }
      }

      /* hiasan buah mengambang di sisi (dekoratif) */
      .float-fruit {
        position: fixed;
        z-index: -1;
        pointer-events: none;
        opacity: 0.55;
        animation: floaty 6s ease-in-out infinite;
      }
      .float-fruit.ff1 {
        top: 180px;
        left: 18px;
        width: 46px;
        animation-delay: 0s;
      }
      .float-fruit.ff2 {
        top: 300px;
        right: 22px;
        width: 40px;
        animation-delay: -2s;
      }
      .float-fruit.ff3 {
        top: 460px;
        left: 30px;
        width: 38px;
        animation-delay: -4s;
      }
      .float-fruit.ff4 {
        top: 560px;
        right: 28px;
        width: 44px;
        animation-delay: -1.5s;
      }
      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0) rotate(-4deg);
        }
        50% {
          transform: translateY(-14px) rotate(4deg);
        }
      }
      @media (max-width: 880px) {
        .float-fruit {
          display: none;
        }
      }

      /* keranjang buah di header */
      .header-baskets {
        max-width: 860px;
        margin: 14px auto 0;
        display: flex;
        justify-content: center;
        gap: 26px;
        flex-wrap: wrap;
      }
      .header-baskets .basket-wrap {
        animation: bob 3s ease-in-out infinite;
      }
      .header-baskets .basket-wrap:nth-child(2) {
        animation-delay: -1s;
      }
      .header-baskets .basket-wrap:nth-child(3) {
        animation-delay: -2s;
      }

      /* ── HEADER ── */
      .site-header {
        max-width: 860px;
        margin: 0 auto;
        padding: 30px 0 10px;
        text-align: center;
      }
      .eyebrow {
        font-family: var(--ui);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--peach);
        margin-bottom: 4px;
      }
      .site-header h1 {
        font-family: var(--ui);
        font-size: clamp(26px, 4.5vw, 40px);
        font-weight: 800;
        line-height: 1.1;
        color: var(--txt);
      }
      .site-header h1 em {
        color: var(--peach);
        font-style: normal;
      }
      .site-header p {
        color: var(--txt-soft);
        font-size: 14px;
        font-weight: 600;
        margin-top: 8px;
      }

      /* ── CATEGORY TABS ── */
      .cat-tabs {
        max-width: 860px;
        margin: 22px auto 0;
        display: flex;
        gap: 10px;
      }
      .cat-tab {
        flex: 1;
        padding: 12px 0;
        border: 2.5px solid var(--bdr);
        border-radius: var(--r);
        background: var(--surf);
        color: var(--muted);
        font-family: var(--ui);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        box-shadow: 0 3px 0 var(--bdr-soft);
      }
      .cat-tab:hover {
        border-color: var(--purp);
        color: var(--txt);
        transform: translateY(-1px);
      }
      .cat-tab.active {
        border-color: var(--peach);
        color: var(--peach);
        background: #fff1e8;
        box-shadow: 0 3px 0 var(--bdr);
      }

      /* ── LEVEL STRIP ── */
      .level-strip {
        max-width: 860px;
        margin: 14px auto 0;
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
      }
      .lbtn {
        padding: 6px 16px;
        border-radius: 99px;
        border: 2px solid var(--bdr);
        background: var(--surf);
        color: var(--muted);
        font-family: var(--ui);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }
      .lbtn:hover {
        border-color: var(--purp);
        color: var(--txt);
        transform: translateY(-1px);
      }
      .lbtn.active {
        border-color: var(--peach);
        color: var(--peach);
        background: #fff1e8;
      }
      .lbtn.done {
        border-color: var(--mint);
        color: #fff;
        background: var(--mint);
      }
      .lbtn.locked {
        border-color: var(--bdr-soft);
        color: #d8c8be;
        cursor: not-allowed;
        opacity: 0.7;
        background: var(--bg2);
      }
      .lbtn.locked:hover {
        border-color: var(--bdr-soft);
        color: #d8c8be;
        transform: none;
      }

      /* ── PROGRESS ── */
      .progress-row {
        max-width: 860px;
        margin: 12px auto 0;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .prog-bar {
        flex: 1;
        height: 8px;
        background: var(--bdr-soft);
        border-radius: 99px;
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--peach), var(--yel));
        transition: width 0.4s;
        border-radius: 99px;
      }
      .prog-label {
        font-family: var(--ui);
        font-size: 13px;
        font-weight: 600;
        color: var(--txt-soft);
        white-space: nowrap;
      }

      /* ── MAIN 2-COL ── */
      .main-wrap {
        max-width: 860px;
        margin: 16px auto 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 620px) {
        .main-wrap {
          grid-template-columns: 1fr;
        }
      }

      /* ── PANEL ── */
      .panel {
        background: var(--surf);
        border: 2.5px solid var(--bdr);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 4px 0 var(--bdr-soft);
      }
      .panel-head {
        padding: 10px 14px;
        border-bottom: 2px solid var(--bdr-soft);
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--card);
      }
      .circles {
        display: flex;
        gap: 5px;
      }
      .c {
        width: 11px;
        height: 11px;
        border-radius: 50%;
      }
      .cr {
        background: #ff8a8a;
      }
      .cy {
        background: #ffcb66;
      }
      .cg {
        background: #7fd8a8;
      }
      .panel-head span {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-left: 3px;
      }

      /* ── SOAL ── */
      .soal-body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .badge-row {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .badge {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        flex-shrink: 0;
        background: linear-gradient(135deg, var(--peach), var(--yel));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--ui);
        font-weight: 800;
        font-size: 18px;
        color: #fff;
        box-shadow: 0 3px 0 rgba(255, 157, 118, 0.4);
      }
      .level-meta h2 {
        font-family: var(--ui);
        font-size: 17px;
        font-weight: 700;
        line-height: 1.2;
        color: var(--txt);
      }
      .tag-row {
        display: flex;
        gap: 5px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .tag {
        font-family: var(--ui);
        font-size: 11px;
        font-weight: 700;
        padding: 2px 9px;
        border-radius: 99px;
        background: #eaf4fd;
        color: var(--blue);
      }
      .task-box {
        background: var(--card);
        border: 2px solid var(--bdr-soft);
        border-radius: var(--r);
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.75;
        color: var(--txt-soft);
      }
      .task-box code {
        background: #fff;
        border: 1px solid var(--bdr);
        padding: 1px 6px;
        border-radius: 5px;
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--peach);
      }
      .task-lbl {
        font-family: var(--ui);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--yel);
        margin-bottom: 7px;
      }

      /* ── EDITOR ── */
      .editor-body {
        padding: 12px 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 11px;
      }
      textarea.code-ed {
        width: 100%;
        height: 200px;
        padding: 14px;
        background: var(--card);
        border: 2px solid var(--bdr);
        border-radius: var(--r);
        color: var(--txt);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.7;
        resize: none;
        overflow-y: auto;
        outline: none;
        transition: border-color 0.2s;
        tab-size: 2;
      }
      textarea.code-ed:focus {
        border-color: var(--peach);
      }
      textarea.code-ed.ok {
        border-color: var(--mint);
        background: #f3fcf7;
      }
      textarea.code-ed.bad {
        border-color: var(--err);
        background: #fff4f5;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        font-family: var(--ui);
        font-size: 14px;
        font-weight: 700;
        padding: 8px 20px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: all 0.15s;
      }
      .btn-run {
        background: var(--peach);
        color: #fff;
        box-shadow: 0 3px 0 #e8825f;
      }
      .btn-run:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }
      .btn-run:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #e8825f;
      }
      .btn-reset {
        background: var(--surf);
        color: var(--txt-soft);
        border: 2px solid var(--bdr);
      }
      .btn-reset:hover {
        color: var(--txt);
        border-color: var(--muted);
      }
      .btn-next {
        background: var(--mint);
        color: #fff;
        margin-left: auto;
        box-shadow: 0 3px 0 #5fc08c;
      }
      .btn-next:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }
      .btn-next:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #5fc08c;
      }
      .shortcut-tip {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
      }

      /* ── OUTPUT AREA ── */
      .output-wrap {
        max-width: 860px;
        margin: 16px auto 0;
        background: var(--surf);
        border: 2.5px solid var(--bdr);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 4px 0 var(--bdr-soft);
      }
      .output-head {
        padding: 10px 14px;
        border-bottom: 2px solid var(--bdr-soft);
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--card);
      }
      .out-status {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-left: 4px;
      }
      .output-canvas {
        min-height: 170px;
        padding: 18px 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-end;
        justify-content: flex-start;
        overflow-x: auto;
      }
      .empty-state {
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
        font-family: var(--ui);
        margin: auto;
      }

      /* ── CHAR CARD ── */
      .char-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .char-card .char-label {
        font-size: 12px;
        font-family: var(--ui);
        font-weight: 700;
        color: var(--txt-soft);
      }
      @keyframes popIn {
        from {
          transform: scale(0.4) translateY(16px);
          opacity: 0;
        }
        to {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
      .char-card svg {
        animation: bob 2.4s ease-in-out infinite;
      }

      /* ── ERROR ── */
      .err-panel {
        padding: 16px 18px;
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--err);
        line-height: 1.8;
      }
      .err-panel .err-name {
        font-family: var(--ui);
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 3px;
      }
      .err-panel .err-tip {
        color: #d4677a;
        margin-top: 6px;
        font-size: 12.5px;
        font-weight: 600;
        font-family: var(--body);
      }

      /* ── SUCCESS ── */
      .success-bar {
        display: none;
        max-width: 860px;
        margin: 14px auto 0;
        background: #f0fbf5;
        border: 2px solid #b8ecd0;
        border-radius: var(--r);
        padding: 14px 18px;
        font-size: 14px;
        font-weight: 600;
        color: #3fa873;
        line-height: 1.6;
      }
      .success-bar code {
        background: #fff;
        border: 1px solid #b8ecd0;
        padding: 1px 6px;
        border-radius: 5px;
        font-family: var(--mono);
        font-size: 12px;
      }
      .success-bar.show {
        display: block;
      }

      /* ── WRONG ANSWER FEEDBACK ── */
      .wrong-bar {
        display: none;
        max-width: 860px;
        margin: 12px auto 0;
        background: #fff4f5;
        border: 2px solid #ffd0d8;
        border-radius: var(--r);
        padding: 13px 18px;
        font-size: 13.5px;
        font-weight: 600;
        color: #d4677a;
        line-height: 1.6;
      }
      .wrong-bar code {
        background: #fff;
        border: 1px solid #ffd0d8;
        padding: 1px 6px;
        border-radius: 5px;
        font-family: var(--mono);
        font-size: 12px;
      }
      .wrong-bar.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- ░░ DEKORASI LANGIT & AWAN ░░ -->
    <div class="sky-deco" aria-hidden="true">
      <svg
        class="cloud c1"
        viewBox="0 0 120 60"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g fill="#ffffff">
          <ellipse cx="40" cy="40" rx="34" ry="18" />
          <circle cx="40" cy="30" r="20" />
          <circle cx="65" cy="34" r="16" />
          <circle cx="22" cy="36" r="14" />
        </g>
      </svg>
      <svg
        class="cloud c2"
        viewBox="0 0 120 60"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g fill="#ffffff">
          <ellipse cx="40" cy="40" rx="34" ry="18" />
          <circle cx="40" cy="30" r="20" />
          <circle cx="65" cy="34" r="16" />
          <circle cx="22" cy="36" r="14" />
        </g>
      </svg>
      <svg
        class="cloud c3"
        viewBox="0 0 120 60"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g fill="#ffffff">
          <ellipse cx="40" cy="40" rx="34" ry="18" />
          <circle cx="40" cy="30" r="20" />
          <circle cx="65" cy="34" r="16" />
          <circle cx="22" cy="36" r="14" />
        </g>
      </svg>
    </div>

    <!-- ░░ BUAH MENGAMBANG (SISI) ░░ -->
    <svg
      class="float-fruit ff1"
      viewBox="0 0 74 86"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <ellipse
        cx="42"
        cy="20"
        rx="8"
        ry="4"
        fill="#7fc88a"
        transform="rotate(20 42 20)"
      />
      <circle cx="37" cy="52" r="28" fill="#ffb05c" />
      <ellipse cx="26" cy="42" rx="5" ry="7" fill="#fff" opacity="0.3" />
    </svg>
    <svg
      class="float-fruit ff2"
      viewBox="0 0 74 86"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <ellipse
        cx="48"
        cy="11"
        rx="7"
        ry="4"
        fill="#7fc88a"
        transform="rotate(-20 48 11)"
      />
      <circle cx="26" cy="40" r="9" fill="#b88ae8" />
      <circle cx="48" cy="40" r="9" fill="#b88ae8" />
      <circle cx="37" cy="38" r="9" fill="#c79df0" />
      <circle cx="37" cy="56" r="10" fill="#b88ae8" />
    </svg>
    <svg
      class="float-fruit ff3"
      viewBox="0 0 74 86"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <path
        d="M37 18 Q40 8 48 8"
        fill="none"
        stroke="#8a6a4a"
        stroke-width="3.5"
        stroke-linecap="round"
      />
      <ellipse
        cx="50"
        cy="14"
        rx="9"
        ry="5"
        fill="#7fc88a"
        transform="rotate(-20 50 14)"
      />
      <path
        d="M37 22 C20 22 13 36 13 50 C13 68 26 80 37 80 C48 80 61 68 61 50 C61 36 54 22 37 22Z"
        fill="#ff8a8a"
      />
      <ellipse
        cx="26"
        cy="40"
        rx="5"
        ry="8"
        fill="#fff"
        opacity="0.35"
        transform="rotate(-20 26 40)"
      />
    </svg>
    <svg
      class="float-fruit ff4"
      viewBox="0 0 74 86"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <ellipse
        cx="42"
        cy="20"
        rx="8"
        ry="4"
        fill="#7fc88a"
        transform="rotate(15 42 20)"
      />
      <ellipse cx="37" cy="52" rx="26" ry="30" fill="#ffd966" />
      <ellipse cx="26" cy="44" rx="5" ry="8" fill="#fff" opacity="0.3" />
    </svg>

    <header class="site-header">

    <script>
      /* ════════════════════════════════════════════
   SVG KARAKTER — buah-buahan kartun
════════════════════════════════════════════ */

      /* helper warna sederhana */
      function darken(hex) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.max(0, r - 40)},${Math.max(0, g - 40)},${Math.max(0, b - 40)})`;
      }
      function lighten(hex) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.min(255, r + 35)},${Math.min(255, g + 35)},${Math.min(255, b + 35)})`;
      }
      function hexToRgb(hex) {
        const m = hex.replace("#", "").match(/.{2}/g);
        return m ? m.map((x) => parseInt(x, 16)) : [255, 200, 150];
      }

      /* wajah lucu standar (mata + pipi + senyum) */
      function face(cx, cy, eyeColor = "#5a4a42") {
        return `
  <circle cx="${cx - 8}" cy="${cy}" r="3.2" fill="${eyeColor}"/>
  <circle cx="${cx - 7}" cy="${cy - 1}" r="1" fill="#fff"/>
  <circle cx="${cx + 8}" cy="${cy}" r="3.2" fill="${eyeColor}"/>
  <circle cx="${cx + 9}" cy="${cy - 1}" r="1" fill="#fff"/>
  <ellipse cx="${cx - 12}" cy="${cy + 5}" rx="3" ry="2" fill="#ff9eb5" opacity="0.55"/>
  <ellipse cx="${cx + 12}" cy="${cy + 5}" rx="3" ry="2" fill="#ff9eb5" opacity="0.55"/>
  <path d="M${cx - 5} ${cy + 5} Q${cx} ${cy + 10} ${cx + 5} ${cy + 5}" fill="none" stroke="${eyeColor}" stroke-width="1.6" stroke-linecap="round"/>`;
      }

      /* 🍎 Apel */
      function svgApple(color = "#ff8a8a", delay = 0) {

  <path d="M37 18 Q40 8 48 8" fill="none" stroke="#8a6a4a" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="50" cy="14" rx="9" ry="5" fill="#7fc88a" transform="rotate(-20 50 14)"/>
  <path d="M37 22 C20 22 13 36 13 50 C13 68 26 80 37 80 C48 80 61 68 61 50 C61 36 54 22 37 22Z" fill="${c}"/>
  <path d="M37 22 C30 22 25 30 25 30 C28 27 33 26 37 26Z" fill="${lighten(c)}" opacity="0.7"/>
  <ellipse cx="26" cy="40" rx="5" ry="8" fill="#fff" opacity="0.35" transform="rotate(-20 26 40)"/>
  ${face(37, 52)}
</svg>
</div>`;
      }

      /* 🍊 Jeruk */
      function svgOrange(color = "#ffb05c", delay = 0) {
        const c = color;
        return `<div class="char-card" style="animation-delay:${delay}ms">
<svg width="74" height="86" viewBox="0 0 74 86" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="34" cy="20" rx="7" ry="4" fill="#7fc88a" transform="rotate(-15 34 20)"/>
  <ellipse cx="44" cy="20" rx="7" ry="4" fill="#6db97a" transform="rotate(15 44 20)"/>
  <circle cx="37" cy="52" r="28" fill="${c}"/>
  <circle cx="37" cy="52" r="28" fill="none" stroke="${darken(c)}" stroke-width="0.5" opacity="0.4"/>
  <circle cx="28" cy="44" r="1.5" fill="${darken(c)}" opacity="0.45"/>
  <circle cx="46" cy="46" r="1.5" fill="${darken(c)}" opacity="0.45"/>
  <circle cx="50" cy="60" r="1.5" fill="${darken(c)}" opacity="0.45"/>
  <ellipse cx="26" cy="42" rx="5" ry="7" fill="#fff" opacity="0.3"/>
  ${face(37, 54)}
</svg>
</div>`;
      }

      /* 🍓 Stroberi */
      function svgStrawberry(color = "#ff7a9c", delay = 0) {
        const c = color;
        return `<div class="char-card" style="animation-delay:${delay}ms">
<svg width="74" height="86" viewBox="0 0 74 86" xmlns="http://www.w3.org/2000/svg">
  <polygon points="37,16 30,26 44,26" fill="#7fc88a"/>
  <polygon points="28,22 24,32 38,28" fill="#6db97a"/>
  <polygon points="46,22 50,32 36,28" fill="#6db97a"/>
  <path d="M37 28 C18 28 15 44 22 60 C27 72 37 80 37 80 C37 80 47 72 52 60 C59 44 56 28 37 28Z" fill="${c}"/>
  <circle cx="28" cy="46" r="1.3" fill="#fff3c4"/>
  <circle cx="46" cy="46" r="1.3" fill="#fff3c4"/>

  <circle cx="44" cy="58" r="1.3" fill="#fff3c4"/>

      /* 🍇 Anggur */
      function svgGrape(color = "#b88ae8", delay = 0) {
        const c = color;

  <path d="M37 14 Q40 8 47 9" fill="none" stroke="#8a6a4a" stroke-width="3" stroke-linecap="round"/>

  <circle cx="37" cy="52" r="10" fill="${c}"/>
  <circle cx="29" cy="68" r="9" fill="${c}"/>
  <circle cx="45" cy="68" r="9" fill="${c}"/>
  <circle cx="23" cy="32" r="2.5" fill="#fff" opacity="0.4"/>
  ${face(37, 52, "#4a2a6a")}
</svg>
</div>`;
      }

      /* 🍋 Lemon */
      function svgLemon(color = "#ffd966", delay = 0) {
        const c = color;
        return `<div class="char-card" style="animation-delay:${delay}ms">
<svg width="74" height="86" viewBox="0 0 74 86" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="42" cy="20" rx="8" ry="4" fill="#7fc88a" transform="rotate(20 42 20)"/>
  <ellipse cx="37" cy="52" rx="26" ry="30" fill="${c}"/>
  <ellipse cx="37" cy="24" rx="4" ry="6" fill="${darken(c)}"/>
  <ellipse cx="37" cy="80" rx="4" ry="6" fill="${darken(c)}"/>

      }

      /* 🍐 Pir */
      function svgPear(color = "#a8d86a", delay = 0) {
        const c = color;
        return `<div class="char-card" style="animation-delay:${delay}ms">
<svg width="74" height="86" viewBox="0 0 74 86" xmlns="http://www.w3.org/2000/svg">
  <path d="M37 16 Q39 9 45 9" fill="none" stroke="#8a6a4a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="46" cy="12" rx="7" ry="4" fill="#7fc88a" transform="rotate(-18 46 12)"/>
  <path d="M37 22 C30 22 28 32 30 40 C20 46 18 60 24 70 C30 80 44 80 50 70 C56 60 54 46 44 40 C46 32 44 22 37 22Z" fill="${c}"/>
  <ellipse cx="28" cy="56" rx="5" ry="8" fill="#fff" opacity="0.3"/>
  ${face(37, 58, "#5a7a2a")}

      }

      /* 🍑 Persik */
      function svgPeach(color = "#ffb38a", delay = 0) {
        const c = color;
        return `<div class="char-card" style="animation-delay:${delay}ms">
<svg width="74" height="86" viewBox="0 0 74 86" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="42" cy="20" rx="8" ry="4.5" fill="#7fc88a" transform="rotate(20 42 20)"/>
  <path d="M37 24 C18 24 13 42 13 54 C13 70 26 80 37 80 C48 80 61 70 61 54 C61 42 56 24 37 24Z" fill="${c}"/>
  <path d="M37 26 C34 36 34 60 37 78" fill="none" stroke="${darken(c)}" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="26" cy="44" rx="5" ry="8" fill="#fff" opacity="0.3"/>
  ${face(37, 54, "#9a5a3a")}
</svg>
</div>`;
      }

      /* 🍉 Semangka (slice) */
      function svgWatermelon(color = "#ff8a8a", delay = 0) {
        const c = color;
        return `<div class="char-card" style="animation-delay:${delay}ms">
<svg width="74" height="86" viewBox="0 0 74 86" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 30 A40 40 0 0 0 64 30 Z" fill="#5fb86a"/>
  <path d="M13 32 A36 36 0 0 0 61 32 Z" fill="#fff" opacity="0.85"/>
  <path d="M16 34 A33 33 0 0 0 58 34 Z" fill="${c}"/>
  <ellipse cx="30" cy="44" rx="1.6" ry="2.4" fill="#3a2a2a"/>
  <ellipse cx="44" cy="44" rx="1.6" ry="2.4" fill="#3a2a2a"/>
  <ellipse cx="37" cy="52" rx="1.6" ry="2.4" fill="#3a2a2a"/>
  ${face(37, 44, "#7a3a3a")}
</svg>
</div>`;
      }

      /* palet & set buah per iterasi */
      const APPLE_COLORS = ["#ff8a8a", "#ff7a7a", "#ffb05c", "#ff9d6c"];
      const ORANGE_COLORS = ["#ffb05c", "#ffa04c", "#ffc266", "#ff9d4c"];

      /* daftar generator buah untuk variasi acak-stabil */
      const FRUITS = [
        (col, d) => svgApple(col, d),
        (col, d) => svgOrange(col, d),
        (col, d) => svgStrawberry(col, d),
        (col, d) => svgGrape(col, d),
        (col, d) => svgLemon(col, d),
        (col, d) => svgPear(col, d),
        (col, d) => svgPeach(col, d),
        (col, d) => svgWatermelon(col, d),
      ];
      /* warna default tiap generator (dipakai saat dirotasi) */
      const FRUIT_DEFAULT = [
        "#ff8a8a",
        "#ffb05c",
        "#ff7a9c",
        "#b88ae8",
        "#ffd966",
        "#a8d86a",
        "#ffb38a",
        "#ff8a8a",
      ];
      function fruitByIdx(idx, delay) {
        const k = idx % FRUITS.length;
        return FRUITS[k](FRUIT_DEFAULT[k], delay);
      }

      /* ════════════════════════════════════════════
   LEVEL DATA
════════════════════════════════════════════ */
      const WHILE_LEVELS = [
        {
          id: 1,
          title: "Petik Apel!",
          tags: ["while", "counter naik"],
          task: `Buat while loop yang berjalan <strong>4 kali</strong>.<br>
      Setiap iterasi, panggil <code>print(i)</code>.<br>
      Output yang diharapkan: angka <strong>1, 2, 3, 4</strong> — dan lihat 4 apel muncul!`,
          starter: `let i = ...;

while (i ... 4) {
  print(i);
  i++;
}`,
          charFn: (val, idx) =>
            svgApple(APPLE_COLORS[idx % APPLE_COLORS.length], idx * 80),
          label: (val) => val,
          validate(out) {
            return out.length === 4 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "🍎 4 apel muncul! Loop berjalan 4x — variabel <code>i</code> naik dari 1 sampai 4, berhenti saat kondisi tidak terpenuhi lagi.",
          solution: [1, 2, 3, 4],
        },
        {
          id: 2,
          title: "Lebih Banyak Jeruk",
          tags: ["while", "kondisi ≤"],
          task: `Buat while loop yang menampilkan angka <strong>1 sampai 6</strong>.<br>
      Lihat berapa banyak jeruk yang muncul!<br>
      Perhatikan kondisi yang tepat agar tidak kurang atau lebih.`,
          starter: `let i = ...;

while (i ... ...) {
  print(i);
  i++;
}`,
          charFn: (val, idx) =>
            svgOrange(ORANGE_COLORS[idx % ORANGE_COLORS.length], idx * 60),
          label: (val) => val,
          validate(out) {
            return out.length === 6 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "🍊 6 jeruk berhasil! Kondisi <code>i &lt;= 6</code> memastikan loop jalan sampai angka 6 inklusif.",
          solution: [1, 2, 3, 4, 5, 6],
        },
        {
          id: 3,
          title: "Hitung Mundur Stroberi",
          tags: ["while", "counter turun"],
          task: `Stroberi-stroberi habis dimakan! Buat while loop yang menampilkan angka <strong>5 sampai 1</strong> (hitung mundur).<br>
      Gunakan kondisi dan cara decrement yang sesuai.`,
          starter: `let i = ...;

while (i ... 1) {
  print(i);
  i...;
}`,
          charFn: (val, idx) => svgStrawberry("#ff7a9c", idx * 70),
          label: (val) => val,
          validate(out) {
            return out.length === 5 && out.every((v, i) => Number(v) === 5 - i);
          },
          successMsg:
            "🍓 Loop mundur berhasil! Kondisi <code>i &gt;= 1</code> dan <code>i--</code> membuat counter turun setiap iterasi.",
          solution: [5, 4, 3, 2, 1],
        },
        {
          id: 4,
          title: "Anggur Genap Saja",
          tags: ["while", "step +2", "genap"],
          task: `Buat while loop yang menampilkan angka <strong>genap</strong>: <strong>2, 4, 6, 8</strong>.<br>
      Mulai dari 2, dan setiap iterasi <em>tambah 2</em> (bukan 1) supaya melompati angka ganjil.`,
          starter: `let i = ...;

while (i ... 8) {
  print(i);
  i ... 2;
}`,
          charFn: (val, idx) => svgGrape("#b88ae8", idx * 75),
          label: (val) => val,
          validate(out) {
            return (
              out.length === 4 && out.every((v, i) => Number(v) === 2 + i * 2)
            );
          },
          successMsg:
            "🍇 Mantap! Dengan <code>i += 2</code>, counter naik dua langkah tiap iterasi sehingga hanya angka genap yang muncul: 2, 4, 6, 8.",
          solution: [2, 4, 6, 8],
        },
        {
          id: 5,
          title: "Keranjang Buah Campur",
          tags: ["while", "1 → 7", "tantangan"],
          task: `Tantangan terakhir! Buat while loop yang menampilkan angka <strong>1 sampai 7</strong>.<br>
      Setiap angka memunculkan buah yang berbeda-beda. Pastikan jumlah dan urutannya pas!`,
          starter: `let i = ...;

while (i ... 7) {
  print(i);
  i++;
}`,
          charFn: (val, idx) => fruitByIdx(idx, idx * 60),
          label: (val) => val,
          validate(out) {
            return out.length === 7 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "🧺 Keranjang penuh! 7 buah berbeda muncul karena loop berjalan 7x dari 1 sampai 7. Kamu sudah menguasai while loop!",
          solution: [1, 2, 3, 4, 5, 6, 7],
        },
      ];

      const DOWHILE_LEVELS = [
        {
          id: 1,
          title: "Do Dulu, Cek Belakangan",
          tags: ["do...while", "eksekusi pertama"],
          task: `Gunakan <strong>do...while</strong> untuk menampilkan angka <strong>1 sampai 3</strong>.<br>
      Perhatikan struktur: blok <code>do { }</code> dijalankan <em>dulu</em>, kondisi dicek <em>sesudahnya</em>.`,
          starter: `let i = ...;

do {
  print(i);
  i++;
} while (i ... 3);`,
          solution: [1, 2, 3],
          charFn: (val, idx) =>
            svgApple(APPLE_COLORS[idx % APPLE_COLORS.length], idx * 90),
          label: (val) => val,
          validate(out) {
            return out.length === 3 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "🍎 do...while berjalan 3x! Blok <code>do</code> pasti dijalankan minimal 1 kali sebelum kondisi diperiksa.",
        },
        {
          id: 2,
          title: "Tetap Jalan Sekali!",
          tags: ["do...while", "kondisi false dari awal"],
          task: `Ini soal konsep penting! Variabel <code>x</code> mulai dari <strong>10</strong>, kondisi <code>x &lt; 5</code>.<br>
      Kondisi sudah <em>false</em> sejak awal — tapi do...while tetap jalan. Berapa buah yang muncul?`,
          starter: `let x = ...;

do {
  print(x);
  x++;
} while (x < ...);`,
          solution: [10],
          charFn: (val, idx) => svgLemon("#ffd966", 0),
          label: (val) => val,
          validate(out) {
            return out.length === 1 && Number(out[0]) === 10;
          },
          successMsg:
            "🍋 1 buah! do...while TETAP jalan 1x meski kondisi sudah false dari awal. Ini perbedaan utamanya dengan while biasa.",
        },
        {
          id: 3,
          title: "Pir & Persik Bergantian",
          tags: ["do...while", "counter", "variasi"],
          task: `Gunakan <strong>do...while</strong> untuk menampilkan angka <strong>1 sampai 5</strong>.<br>
      Kali ini outputnya pir dan persik bergantian!`,
          starter: `let i = ...;

do {
  print(i);
  i++;
} while (i ... 5);`,
          solution: [1, 2, 3, 4, 5],
          charFn: (val, idx) =>
            idx % 2 === 0
              ? svgPear("#a8d86a", idx * 70)
              : svgPeach("#ffb38a", idx * 70),
          label: (val) => val,
          validate(out) {
            return out.length === 5 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "🍐🍑 do...while berjalan 5x — hasilnya pir dan persik bergantian sesuai jumlah iterasi.",
        },
        {
          id: 4,
          title: "Semangka Mundur",
          tags: ["do...while", "counter turun"],
          task: `Gunakan <strong>do...while</strong> untuk hitung mundur dari <strong>4 sampai 1</strong>.<br>
      Blok <code>do</code> jalan dulu, lalu kondisi <code>i &gt;= 1</code> dicek. Jangan lupa <code>i--</code>.`,
          starter: `let i = ...;

do {
  print(i);
  i...;
} while (i ... 1);`,
          solution: [4, 3, 2, 1],
          charFn: (val, idx) => svgWatermelon("#ff8a8a", idx * 80),
          label: (val) => val,
          validate(out) {
            return out.length === 4 && out.every((v, i) => Number(v) === 4 - i);
          },
          successMsg:
            "🍉 Hitung mundur berhasil! do...while juga bisa turun: <code>i--</code> tiap iterasi dan berhenti saat <code>i &gt;= 1</code> jadi false.",
        },
        {
          id: 5,
          title: "Panen Besar Buah",
          tags: ["do...while", "1 → 6", "tantangan"],
          task: `Tantangan penutup! Gunakan <strong>do...while</strong> untuk menampilkan angka <strong>1 sampai 6</strong>.<br>
      Setiap angka memunculkan buah berbeda. Pastikan jumlah dan urutannya tepat!`,
          starter: `let i = ...;

do {
  print(i);
  i++;
} while (i ... 6);`,
          solution: [1, 2, 3, 4, 5, 6],
          charFn: (val, idx) => fruitByIdx(idx, idx * 60),
          label: (val) => val,
          validate(out) {
            return out.length === 6 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "🧺 Panen besar! 6 buah berbeda muncul — kamu sudah memahami do...while dengan baik. Selamat!",
        },
      ];

      /* ════════════════════════════════════════════
   STATE & NAVIGATION
════════════════════════════════════════════ */
      let category = "while";
      let currentIdx = 0;
      let done = { while: new Set(), dowhile: new Set() };

      function getLevels() {
        return category === "while" ? WHILE_LEVELS : DOWHILE_LEVELS;
      }
      function getCurrent() {
        return getLevels()[currentIdx];
      }

      function setCategory(cat) {
        category = cat;
        currentIdx = 0;
        document.querySelectorAll(".cat-tab").forEach((t, i) => {
          t.classList.toggle(
            "active",
            (i === 0 && cat === "while") || (i === 1 && cat === "dowhile"),
          );
        });
        renderStrip();
        loadLevel(0);
      }

      function renderStrip() {
        const lvls = getLevels(),
          ds = done[category];
        document.getElementById("level-strip").innerHTML = lvls
          .map((l, i) => {
            const isDone = ds.has(i);
            const isActive = i === currentIdx;
            /* soal terbuka jika: sudah selesai, sedang aktif, atau soal sebelumnya sudah selesai */
            const unlocked =
              isDone || isActive || (i > 0 && ds.has(i - 1)) || i === 0;
            const cls = [
              "lbtn",
              isActive ? "active" : "",
              isDone ? "done" : "",
              !unlocked ? "locked" : "",
            ]
              .filter(Boolean)
              .join(" ");
            const onclick = unlocked ? `onclick="jumpLevel(${i})"` : "";
            const icon = isDone ? "✓ " : !unlocked ? "🔒 " : "";
            return `<button class="${cls}" ${onclick}>${icon}Soal ${l.id}</button>`;
          })
          .join("");
      }

      function jumpLevel(idx) {
        const ds = done[category];
        /* boleh pindah hanya jika: soal 0, sudah selesai, atau soal sebelumnya selesai */
        const unlocked = idx === 0 || ds.has(idx) || ds.has(idx - 1);
        if (!unlocked) return;
        currentIdx = idx;
        loadLevel(idx);
      }

      function loadLevel(idx) {
        currentIdx = idx;
        const lvl = getCurrent();
        document.getElementById("badge-num").textContent = lvl.id;
        document.getElementById("lvl-title").textContent = lvl.title;
        document.getElementById("lvl-tags").innerHTML = lvl.tags
          .map((t) => `<span class="tag">${t}</span>`)
          .join("");
        document.getElementById("lvl-task").innerHTML = lvl.task;
        const ed = document.getElementById("editor");
        ed.value = lvl.starter;
        ed.className = "code-ed";
        clearOutput();
        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");
        document.getElementById("btn-next").style.display = done[category].has(
          idx,
        )
          ? "flex"
          : "none";
        renderStrip();
        updateProgress();
      }

      function updateProgress() {
        const total = getLevels().length,
          n = done[category].size;
        document.getElementById("prog-fill").style.width =
          (total ? (n / total) * 100 : 0) + "%";
        document.getElementById("prog-label").textContent =
          `${n} / ${total} selesai`;
      }

      function nextLevel() {
        const lvls = getLevels();
        if (currentIdx < lvls.length - 1) {
          loadLevel(currentIdx + 1);
          window.scrollTo({ top: 0, behavior: "smooth" });
        } else {
          document.getElementById("success-bar").innerHTML =
            `🏆 <strong>Semua soal ${category === "while" ? "while loop" : "do...while"} selesai!</strong> Pindah ke kategori lain atau ulangi soal favoritmu.`;
          document.getElementById("success-bar").classList.add("show");
          document.getElementById("btn-next").style.display = "none";
        }
      }

      /* ════════════════════════════════════════════
   RUN
════════════════════════════════════════════ */
      function runCode() {
        const code = document.getElementById("editor").value.trim();
        if (!code) return;

        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");

        if (code.includes("...")) {
          showErr({
            name: "IncompleteCode",
            message: "Masih ada bagian <code>...</code> yang belum diisi.",
            tip: "Ganti semua tanda ... dengan kode JavaScript yang sesuai.",
          });
          setStatus("✗ kode belum lengkap");
          return;
        }

        const outputs = [],
          MAX = 300;
        const sandbox = {
          print: (...a) => {
            outputs.push(a.map(String).join(" "));
          },
        };
        const guarded = guardCode(code, MAX);
        const ed = document.getElementById("editor");

        try {
          new Function(...Object.keys(sandbox), guarded)(
            ...Object.values(sandbox),
          );
        } catch (e) {
          ed.className = "code-ed bad";
          showErr(fmtErr(e));
          setStatus("✗ error");
          return;
        }

        if (!outputs.length) {
          ed.className = "code-ed bad";
          showErr({
            name: "NoOutput",
            message: "Tidak ada output yang dihasilkan.",
            tip: "Pastikan kamu memanggil <code>print()</code> di dalam loop.",
          });
          setStatus("✗ tidak ada output");
          return;
        }

        const lvl = getCurrent();

        /* Tampilkan karakter dulu */
        renderChars(outputs, lvl);

        const passed = lvl.validate(outputs);

        if (passed) {
          ed.className = "code-ed ok";
          setStatus(`✓ ${outputs.length} output — BENAR!`);
          done[category].add(currentIdx);
          document.getElementById("success-bar").innerHTML =
            `✅ ${lvl.successMsg}`;
          document.getElementById("success-bar").classList.add("show");
          document.getElementById("wrong-bar").classList.remove("show");
          document.getElementById("btn-next").style.display =
            currentIdx < getLevels().length - 1 ? "flex" : "none";
          renderStrip();
          updateProgress();
        } else {
          ed.className = "code-ed bad";
          setStatus(`✗ ${outputs.length} output — belum tepat`);
          /* feedback spesifik: bandingkan output vs ekspektasi */
          const wrongFeedback = buildWrongFeedback(outputs, lvl);
          document.getElementById("wrong-bar").innerHTML = wrongFeedback;
          document.getElementById("wrong-bar").classList.add("show");
          document.getElementById("btn-next").style.display = "none";
        }
      }

      function buildWrongFeedback(outputs, lvl) {
        const got = outputs.length;
        const expect = lvl.solution ? lvl.solution.length : "?";

        /* cek jumlah */
        if (got !== expect) {
          return `❌ Output kamu: <strong>${got} baris</strong> — yang diharapkan: <strong>${expect} baris</strong>.<br>
      Periksa nilai awal counter, kondisi loop, dan increment/decrement-mu.`;
        }

        /* jumlah benar, nilai salah */
        const firstWrong = outputs.findIndex(
          (v, i) => lvl.solution && Number(v) !== lvl.solution[i],
        );
        if (firstWrong !== -1 && lvl.solution) {
          return `❌ Jumlah output sudah benar (${got} baris), tapi nilainya belum tepat.<br>
      Output ke-${firstWrong + 1}: kamu menghasilkan <code>${outputs[firstWrong]}</code>, yang diharapkan <code>${lvl.solution[firstWrong]}</code>.<br>
      Cek kembali nilai awal variabelmu.`;
        }

        return `❌ Output belum sesuai. Cek kembali kondisi dan nilai awal loop-mu.`;
      }

      function guardCode(code, max) {
        const g = `if(typeof __lc__==='undefined'){var __lc__=0;}__lc__++;if(__lc__>${max}){throw new RangeError("Loop berjalan lebih dari ${max}x — kemungkinan infinite loop!");}`;
        return code
          .replace(/\bwhile\s*\([^)]*\)\s*\{/g, (m) => m + "\n" + g)
          .replace(/\bdo\s*\{/g, (m) => m + "\n" + g);
      }

      function fmtErr(e) {
        const msg = e.message || String(e);
        let tip = "";
        if (msg.includes("is not defined"))
          tip = "Variabel belum dideklarasikan. Gunakan let atau var.";
        else if (msg.includes("Unexpected") || e instanceof SyntaxError)
          tip = "Periksa penulisan: kurung, kurawal, dan titik koma.";
        else if (msg.includes("lebih dari"))
          tip =
            "Kondisi loop tidak pernah false — pastikan nilai counter berubah.";
        return { name: e.name || "Error", message: msg, tip };
      }

      /* ════════════════════════════════════════════
   OUTPUT RENDER
════════════════════════════════════════════ */
      function renderChars(outputs, lvl) {
        const canvas = document.getElementById("out-canvas");
        canvas.innerHTML = outputs
          .map((val, idx) => {
            const char = lvl.charFn(val, idx);
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;animation:popIn .3s cubic-bezier(.34,1.56,.64,1) ${idx * 80}ms both">
      ${char}
      <span style="font-size:12px;font-family:var(--ui);font-weight:700;color:var(--txt-soft)">${lvl.label(val)}</span>
    </div>`;
          })
          .join("");
      }

      function clearOutput() {
        document.getElementById("out-canvas").innerHTML =
          '<div class="empty-state">▷ karakter akan muncul di sini</div>';
        setStatus("— tekan Run untuk melihat output");
      }
      function setStatus(s) {
        document.getElementById("out-status").textContent = s;
      }
      function showErr(err) {
        document.getElementById("out-canvas").innerHTML = `
    <div class="err-panel">
      <div class="err-name">⚠ ${err.name}</div>
      <div>${err.message}</div>
      ${err.tip ? `<div class="err-tip">💡 ${err.tip}</div>` : ""}
    </div>`;
      }

      /* ════════════════════════════════════════════
   CONTROLS
════════════════════════════════════════════ */
      function resetCode() {
        const ed = document.getElementById("editor");
        ed.value = getCurrent().starter;
        ed.className = "code-ed";
        clearOutput();
        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");
      }

      document
        .getElementById("editor")
        .addEventListener("keydown", function (e) {
          if (e.key === "Tab") {
            e.preventDefault();
            const s = this.selectionStart,
              end = this.selectionEnd;
            this.value =
              this.value.substring(0, s) + "  " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = s + 2;
          }
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            e.preventDefault();
            runCode();
          }
        });

      /* BOOT */
      renderStrip();
      loadLevel(0);
    </script>
