<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop Practice — While & Do While</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0e17;
        --surf: #1a1933;
        --card: #22213a;
        --bdr: #2e2d4d;
        --coral: #ff6b6b;
        --yel: #ffe66d;
        --mint: #6bffb8;
        --purp: #b48eff;
        --blue: #6bcfff;
        --txt: #fffffe;
        --muted: #8f8bb0;
        --err: #ff4d6d;
        --ui: "Space Grotesk", sans-serif;
        --mono: "JetBrains Mono", monospace;
        --r: 10px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--ui);
        background: var(--bg);
        color: var(--txt);
        padding: 0 12px 80px;
        min-height: 100vh;
      }

      /* ── HEADER ── */
      .site-header {
        max-width: 860px;
        margin: 0 auto;
        padding: 28px 0 10px;
        text-align: center;
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--coral);
        margin-bottom: 8px;
      }
      .site-header h1 {
        font-size: clamp(22px, 4vw, 34px);
        font-weight: 700;
        line-height: 1.2;
      }
      .site-header h1 em {
        color: var(--yel);
        font-style: normal;
      }
      .site-header p {
        color: var(--muted);
        font-size: 13px;
        margin-top: 6px;
      }

      /* ── CATEGORY TABS ── */
      .cat-tabs {
        max-width: 860px;
        margin: 20px auto 0;
        display: flex;
        gap: 8px;
      }
      .cat-tab {
        flex: 1;
        padding: 10px 0;
        border: 2px solid var(--bdr);
        border-radius: var(--r);
        background: var(--surf);
        color: var(--muted);
        font-family: var(--ui);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .cat-tab:hover {
        border-color: var(--purp);
        color: var(--txt);
      }
      .cat-tab.active {
        border-color: var(--coral);
        color: var(--coral);
        background: rgba(255, 107, 107, 0.08);
      }

      /* ── LEVEL STRIP ── */
      .level-strip {
        max-width: 860px;
        margin: 12px auto 0;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .lbtn {
        padding: 5px 15px;
        border-radius: 99px;
        border: 1.5px solid var(--bdr);
        background: transparent;
        color: var(--muted);
        font-family: var(--ui);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .lbtn:hover {
        border-color: var(--purp);
        color: var(--txt);
      }
      .lbtn.active {
        border-color: var(--coral);
        color: var(--coral);
      }
      .lbtn.done {
        border-color: var(--mint);
        color: var(--bg);
        background: var(--mint);
      }
      .lbtn.locked {
        border-color: var(--bdr);
        color: #3d3b5c;
        cursor: not-allowed;
        opacity: 0.5;
      }
      .lbtn.locked:hover {
        border-color: var(--bdr);
        color: #3d3b5c;
      }

      /* ── PROGRESS ── */
      .progress-row {
        max-width: 860px;
        margin: 10px auto 0;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .prog-bar {
        flex: 1;
        height: 5px;
        background: var(--bdr);
        border-radius: 99px;
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--coral), var(--yel));
        transition: width 0.4s;
      }
      .prog-label {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      /* ── MAIN 2-COL ── */
      .main-wrap {
        max-width: 860px;
        margin: 14px auto 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        align-items: start;
      }
      @media (max-width: 620px) {
        .main-wrap {
          grid-template-columns: 1fr;
        }
      }

      /* ── PANEL ── */
      .panel {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: 12px;
        overflow: hidden;
      }
      .panel-head {
        padding: 9px 13px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .circles {
        display: flex;
        gap: 5px;
      }
      .c {
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }
      .cr {
        background: #ff5f57;
      }
      .cy {
        background: #febc2e;
      }
      .cg {
        background: #28c840;
      }
      .panel-head span {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-left: 3px;
      }

      /* ── SOAL ── */
      .soal-body {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 11px;
      }
      .badge-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .badge {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        flex-shrink: 0;
        background: linear-gradient(135deg, var(--coral), #ff9a6b);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        color: #fff;
      }
      .level-meta h2 {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.3;
      }
      .tag-row {
        display: flex;
        gap: 5px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .tag {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 99px;
        background: rgba(107, 207, 255, 0.12);
        color: var(--blue);
        letter-spacing: 0.5px;
      }
      .task-box {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--bdr);
        border-radius: var(--r);
        padding: 12px 14px;
        font-size: 13.5px;
        line-height: 1.75;
      }
      .task-lbl {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--yel);
        margin-bottom: 6px;
      }

      /* ── EDITOR ── */
      .editor-body {
        padding: 10px 12px 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      textarea.code-ed {
        width: 100%;
        height: 190px;
        padding: 12px;
        background: var(--card);
        border: 1.5px solid var(--bdr);
        border-radius: var(--r);
        color: var(--txt);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.7;
        resize: none;
        overflow-y: auto;
        outline: none;
        transition: border-color 0.2s;
        tab-size: 2;
      }
      textarea.code-ed:focus {
        border-color: var(--coral);
      }
      textarea.code-ed.ok {
        border-color: var(--mint);
      }
      textarea.code-ed.bad {
        border-color: var(--err);
      }
      .btn-row {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        font-family: var(--ui);
        font-size: 13px;
        font-weight: 600;
        padding: 7px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: all 0.15s;
      }
      .btn-run {
        background: var(--coral);
        color: #fff;
      }
      .btn-run:hover {
        background: #f04f4f;
      }
      .btn-reset {
        background: transparent;
        color: var(--muted);
        border: 1.5px solid var(--bdr);
      }
      .btn-reset:hover {
        color: var(--txt);
        border-color: var(--muted);
      }
      .btn-next {
        background: var(--mint);
        color: var(--bg);
        margin-left: auto;
      }
      .btn-next:hover {
        filter: brightness(1.1);
      }
      .shortcut-tip {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
      }

      /* ── OUTPUT AREA ── */
      .output-wrap {
        max-width: 860px;
        margin: 14px auto 0;
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: 12px;
        overflow: hidden;
      }
      .output-head {
        padding: 9px 13px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .out-status {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-left: 4px;
      }
      .output-canvas {
        min-height: 160px;
        padding: 16px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: flex-end;
        justify-content: flex-start;
        overflow-x: auto;
      }
      .empty-state {
        color: var(--bdr);
        font-size: 13px;
        font-family: var(--mono);
        margin: auto;
      }

      /* ── DOG SVG CARD ── */
      .dog-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .dog-card .dog-label {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
      }
      @keyframes popIn {
        from {
          transform: scale(0.4) translateY(16px);
          opacity: 0;
        }
        to {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }

      /* ── ERROR ── */
      .err-panel {
        padding: 14px 16px;
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--err);
        line-height: 1.8;
      }
      .err-panel .err-name {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 3px;
      }
      .err-panel .err-tip {
        color: #ff8fa3;
        margin-top: 6px;
        font-size: 12px;
        font-family: var(--ui);
      }

      /* ── SUCCESS ── */
      .success-bar {
        display: none;
        max-width: 860px;
        margin: 12px auto 0;
        background: rgba(107, 255, 184, 0.08);
        border: 1px solid rgba(107, 255, 184, 0.3);
        border-radius: var(--r);
        padding: 12px 16px;
        font-size: 13.5px;
        color: var(--mint);
        line-height: 1.6;
      }
      .success-bar.show {
        display: block;
      }

      /* ── WRONG ANSWER FEEDBACK ── */
      .wrong-bar {
        display: none;
        max-width: 860px;
        margin: 10px auto 0;
        background: rgba(255, 77, 109, 0.07);
        border: 1px solid rgba(255, 77, 109, 0.3);
        border-radius: var(--r);
        padding: 11px 16px;
        font-size: 13px;
        color: #ff8fa3;
        line-height: 1.6;
      }
      .wrong-bar.show {
        display: block;
      }

      /* ── VALIDATION DETAIL inside output ── */
      .val-detail {
        padding: 12px 16px;
        font-size: 13px;
        line-height: 1.8;
        border-top: 1px solid var(--bdr);
      }
      .val-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .val-row .tick {
        font-size: 14px;
      }
      .val-row .val-txt {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <p class="eyebrow">JavaScript Practice</p>
      <h1>Loop Quest — <em>While</em> Edition</h1>
      <p>
        Isi bagian
        <code
          style="
            background: rgba(255, 255, 255, 0.07);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 12px;
          "
          >...</code
        >
        lalu klik Run — lihat hasilnya sebagai gambar!
      </p>
    </header>

    <div class="cat-tabs">
      <button class="cat-tab active" onclick="setCategory('while')">
        ⟳ &nbsp;while loop
      </button>
      <button class="cat-tab" onclick="setCategory('dowhile')">
        ↺ &nbsp;do...while loop
      </button>
    </div>

    <div class="level-strip" id="level-strip"></div>

    <div class="progress-row">
      <div class="prog-bar">
        <div class="prog-fill" id="prog-fill" style="width: 0%"></div>
      </div>
      <span class="prog-label" id="prog-label">0 / 0 selesai</span>
    </div>

    <div class="main-wrap">
      <div class="panel">
        <div class="panel-head">
          <div class="circles">
            <div class="c cr"></div>
            <div class="c cy"></div>
            <div class="c cg"></div>
          </div>
          <span>soal.js</span>
        </div>
        <div class="soal-body">
          <div class="badge-row">
            <div class="badge" id="badge-num">1</div>
            <div class="level-meta">
              <h2 id="lvl-title">—</h2>
              <div class="tag-row" id="lvl-tags"></div>
            </div>
          </div>
          <div class="task-box">
            <div class="task-lbl">📋 Tugas</div>
            <div id="lvl-task"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="circles">
            <div class="c cr"></div>
            <div class="c cy"></div>
            <div class="c cg"></div>
          </div>
          <span>jawaban.js</span>
        </div>
        <div class="editor-body">
          <textarea class="code-ed" id="editor" spellcheck="false"></textarea>
          <div class="btn-row">
            <button class="btn btn-run" onclick="runCode()">▶ Run</button>
            <button class="btn btn-reset" onclick="resetCode()">↺ Reset</button>
            <span class="shortcut-tip">Ctrl+Enter</span>
            <button
              class="btn btn-next"
              id="btn-next"
              style="display: none"
              onclick="nextLevel()"
            >
              Berikutnya →
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="output-wrap">
      <div class="output-head">
        <div class="circles">
          <div class="c cr"></div>
          <div class="c cy"></div>
          <div class="c cg"></div>
        </div>
        <span class="out-status" id="out-status"
          >— tekan Run untuk melihat output</span
        >
      </div>
      <div class="output-canvas" id="out-canvas">
        <div class="empty-state">▷ karakter akan muncul di sini</div>
      </div>
    </div>

    <div class="success-bar" id="success-bar"></div>
    <div class="wrong-bar" id="wrong-bar"></div>

    <script>
      /* ════════════════════════════════════════════
   SVG KARAKTER — anjing & kucing kartun
════════════════════════════════════════════ */

      /* Anjing kartun — warna bisa dikustomisasi */
      function svgDog(color = "#e8a87c", delay = 0) {
        const c = color;
        const d = `style="animation-delay:${delay}ms"`;
        return `<div class="dog-card" ${d}>
<svg width="72" height="88" viewBox="0 0 72 88" xmlns="http://www.w3.org/2000/svg">
  <!-- telinga kiri -->
  <ellipse cx="18" cy="28" rx="11" ry="16" fill="${darken(c)}" transform="rotate(-18 18 28)"/>
  <!-- telinga kanan -->
  <ellipse cx="54" cy="28" rx="11" ry="16" fill="${darken(c)}" transform="rotate(18 54 28)"/>
  <!-- kepala -->
  <ellipse cx="36" cy="34" rx="24" ry="22" fill="${c}"/>
  <!-- moncong -->
  <ellipse cx="36" cy="46" rx="13" ry="9" fill="${lighten(c)}"/>
  <!-- mata kiri -->
  <circle cx="26" cy="30" r="5" fill="#1a1a2e"/>
  <circle cx="27.5" cy="28.5" r="1.5" fill="#fff"/>
  <!-- mata kanan -->
  <circle cx="46" cy="30" r="5" fill="#1a1a2e"/>
  <circle cx="47.5" cy="28.5" r="1.5" fill="#fff"/>
  <!-- hidung -->
  <ellipse cx="36" cy="43" rx="4.5" ry="3" fill="#1a1a2e"/>
  <circle cx="35" cy="42.5" r="1" fill="#555"/>
  <!-- mulut -->
  <path d="M31 48 Q36 53 41 48" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- badan -->
  <rect x="16" y="54" width="40" height="28" rx="14" fill="${c}"/>
  <!-- ekor -->
  <path d="M56 64 Q72 52 68 44" fill="none" stroke="${darken(c)}" stroke-width="5" stroke-linecap="round"/>
  <!-- kaki kiri -->
  <rect x="19" y="76" width="11" height="10" rx="5" fill="${darken(c)}"/>
  <!-- kaki kanan -->
  <rect x="42" y="76" width="11" height="10" rx="5" fill="${darken(c)}"/>
</svg>
</div>`;
      }

      /* Kucing kartun — untuk variasi di beberapa soal */
      function svgCat(color = "#c9b8e8", delay = 0) {
        const c = color;
        const d = `style="animation-delay:${delay}ms"`;
        return `<div class="dog-card" ${d}>
<svg width="72" height="88" viewBox="0 0 72 88" xmlns="http://www.w3.org/2000/svg">
  <!-- telinga kiri (lancip) -->
  <polygon points="12,30 20,8 30,28" fill="${darken(c)}"/>
  <!-- telinga kanan (lancip) -->
  <polygon points="60,30 52,8 42,28" fill="${darken(c)}"/>
  <!-- telinga dalam kiri -->
  <polygon points="15,29 21,14 28,28" fill="#ffb8c8"/>
  <!-- telinga dalam kanan -->
  <polygon points="57,29 51,14 44,28" fill="#ffb8c8"/>
  <!-- kepala -->
  <ellipse cx="36" cy="34" rx="24" ry="22" fill="${c}"/>
  <!-- moncong -->
  <ellipse cx="36" cy="46" rx="11" ry="7" fill="${lighten(c)}"/>
  <!-- mata kiri -->
  <ellipse cx="26" cy="30" rx="5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="26" cy="29" rx="2" ry="3" fill="#2e8b57"/>
  <circle cx="27" cy="28" r="1.2" fill="#fff"/>
  <!-- mata kanan -->
  <ellipse cx="46" cy="30" rx="5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="46" cy="29" rx="2" ry="3" fill="#2e8b57"/>
  <circle cx="47" cy="28" r="1.2" fill="#fff"/>
  <!-- hidung -->
  <polygon points="36,41 33.5,44 38.5,44" fill="#ff9eb5"/>
  <!-- mulut -->
  <path d="M33,44 Q36,49 39,44" fill="none" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <!-- kumis kiri -->
  <line x1="24" y1="44" x2="10" y2="42" stroke="#aaa" stroke-width="1"/>
  <line x1="24" y1="46" x2="9"  y2="47" stroke="#aaa" stroke-width="1"/>
  <!-- kumis kanan -->
  <line x1="48" y1="44" x2="62" y2="42" stroke="#aaa" stroke-width="1"/>
  <line x1="48" y1="46" x2="63" y2="47" stroke="#aaa" stroke-width="1"/>
  <!-- badan -->
  <rect x="16" y="54" width="40" height="28" rx="14" fill="${c}"/>
  <!-- ekor melengkung -->
  <path d="M56 70 Q76 58 70 42 Q68 38 64 42" fill="none" stroke="${darken(c)}" stroke-width="5" stroke-linecap="round"/>
  <!-- kaki kiri -->
  <rect x="19" y="76" width="11" height="10" rx="5" fill="${darken(c)}"/>
  <!-- kaki kanan -->
  <rect x="42" y="76" width="11" height="10" rx="5" fill="${darken(c)}"/>
</svg>
</div>`;
      }

      /* helper warna sederhana */
      function darken(hex) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.max(0, r - 40)},${Math.max(0, g - 40)},${Math.max(0, b - 40)})`;
      }
      function lighten(hex) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.min(255, r + 35)},${Math.min(255, g + 35)},${Math.min(255, b + 35)})`;
      }
      function hexToRgb(hex) {
        const m = hex.replace("#", "").match(/.{2}/g);
        return m ? m.map((x) => parseInt(x, 16)) : [200, 160, 100];
      }

      /* palet warna anjing per iterasi */
      const DOG_COLORS = [
        "#e8a87c",
        "#f5c58a",
        "#c8a06a",
        "#e8c4a0",
        "#d4936a",
        "#f0b090",
      ];
      const CAT_COLORS = [
        "#c9b8e8",
        "#b8d4e8",
        "#e8c9d4",
        "#d4e8c9",
        "#e8d4b8",
        "#c4c9e8",
      ];

      /* ════════════════════════════════════════════
   LEVEL DATA
════════════════════════════════════════════ */
      const WHILE_LEVELS = [
        {
          id: 1,
          title: "Panggil Anjing!",
          tags: ["while", "counter naik"],
          task: `Buat while loop yang berjalan <strong>4 kali</strong>.<br>
      Setiap iterasi, panggil <code>print(i)</code>.<br>
      Output yang diharapkan: angka <strong>1, 2, 3, 4</strong> — dan lihat 4 anjing muncul!`,
          starter: `let i = ...;

while (i ... 4) {
  print(i);
  i++;
}`,
          charFn: (val, idx) =>
            svgDog(DOG_COLORS[idx % DOG_COLORS.length], idx * 80),
          label: (val) => val,
          validate(out) {
            return out.length === 4 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "🐶 4 anjing muncul! Loop berjalan 4x — variabel <code>i</code> naik dari 1 sampai 4, berhenti saat kondisi tidak terpenuhi lagi.",
          solution: [1, 2, 3, 4],
        },
        {
          id: 2,
          title: "Lebih Banyak Kucing",
          tags: ["while", "kondisi ≤"],
          task: `Buat while loop yang menampilkan angka <strong>1 sampai 6</strong>.<br>
      Lihat berapa banyak kucing yang muncul!<br>
      Perhatikan kondisi yang tepat agar tidak kurang atau lebih.`,
          starter: `let i = ...;

while (i ... ...) {
  print(i);
  i++;
}`,
          charFn: (val, idx) =>
            svgCat(CAT_COLORS[idx % CAT_COLORS.length], idx * 60),
          label: (val) => val,
          validate(out) {
            return out.length === 6 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "🐱 6 kucing berhasil! Kondisi <code>i &lt;= 6</code> memastikan loop jalan sampai angka 6 inklusif.",
          solution: [1, 2, 3, 4, 5, 6],
        },
        {
          id: 3,
          title: "Hitung Mundur Anjing",
          tags: ["while", "counter turun"],
          task: `Anjing-anjing pergi pulang! Buat while loop yang menampilkan angka <strong>5 sampai 1</strong> (hitung mundur).<br>
      Gunakan kondisi dan cara decrement yang sesuai.`,
          starter: `let i = ...;

while (i ... 1) {
  print(i);
  i...;
}`,
          charFn: (val, idx) =>
            svgDog(DOG_COLORS[(5 - idx) % DOG_COLORS.length], idx * 70),
          label: (val) => val,
          validate(out) {
            return out.length === 5 && out.every((v, i) => Number(v) === 5 - i);
          },
          successMsg:
            "🐶 Loop mundur berhasil! Kondisi <code>i &gt;= 1</code> dan <code>i--</code> membuat counter turun setiap iterasi.",
          solution: [5, 4, 3, 2, 1],
        },
      ];

      const DOWHILE_LEVELS = [
        {
          id: 1,
          title: "Do Dulu, Cek Belakangan",
          tags: ["do...while", "eksekusi pertama"],
          task: `Gunakan <strong>do...while</strong> untuk menampilkan angka <strong>1 sampai 3</strong>.<br>
      Perhatikan struktur: blok <code>do { }</code> dijalankan <em>dulu</em>, kondisi dicek <em>sesudahnya</em>.`,
          starter: `let i = ...;

do {
  print(i);
  i++;
} while (i ... 3);`,
          solution: [1, 2, 3],
          charFn: (val, idx) =>
            svgDog(DOG_COLORS[idx % DOG_COLORS.length], idx * 90),
          label: (val) => val,
          validate(out) {
            return out.length === 3 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "do...while berjalan 3x! Blok <code>do</code> pasti dijalankan minimal 1 kali sebelum kondisi diperiksa.",
        },
        {
          id: 2,
          title: "Tetap Jalan Sekali!",
          tags: ["do...while", "kondisi false dari awal"],
          task: `Ini soal konsep penting! Variabel <code>x</code> mulai dari <strong>10</strong>, kondisi <code>x &lt; 5</code>.<br>
      Kondisi sudah <em>false</em> sejak awal — tapi do...while tetap jalan. Berapa anjing yang muncul?`,
          starter: `let x = ...;

do {
  print(x);
  x++;
} while (x < ...);`,
          solution: [10],
          charFn: (val, idx) => svgDog("#e8a87c", 0),
          label: (val) => val,
          validate(out) {
            return out.length === 1 && Number(out[0]) === 10;
          },
          successMsg:
            "1 anjing! do...while TETAP jalan 1x meski kondisi sudah false dari awal. Ini perbedaan utamanya dengan while biasa.",
        },
        {
          id: 3,
          title: "Campuran Anjing & Kucing",
          tags: ["do...while", "counter", "variasi"],
          task: `Gunakan <strong>do...while</strong> untuk menampilkan angka <strong>1 sampai 5</strong>.<br>
      Kali ini outputnya campuran anjing dan kucing bergantian!`,
          starter: `let i = ...;

do {
  print(i);
  i++;
} while (i ... 5);`,
          solution: [1, 2, 3, 4, 5],
          charFn: (val, idx) =>
            idx % 2 === 0
              ? svgDog(DOG_COLORS[idx % DOG_COLORS.length], idx * 70)
              : svgCat(CAT_COLORS[idx % CAT_COLORS.length], idx * 70),
          label: (val) => val,
          validate(out) {
            return out.length === 5 && out.every((v, i) => Number(v) === i + 1);
          },
          successMsg:
            "do...while berjalan 5x — hasilnya anjing dan kucing bergantian sesuai jumlah iterasi.",
        },
      ];

      /* ════════════════════════════════════════════
   STATE & NAVIGATION
════════════════════════════════════════════ */
      let category = "while";
      let currentIdx = 0;
      let done = { while: new Set(), dowhile: new Set() };

      function getLevels() {
        return category === "while" ? WHILE_LEVELS : DOWHILE_LEVELS;
      }
      function getCurrent() {
        return getLevels()[currentIdx];
      }

      function setCategory(cat) {
        category = cat;
        currentIdx = 0;
        document.querySelectorAll(".cat-tab").forEach((t, i) => {
          t.classList.toggle(
            "active",
            (i === 0 && cat === "while") || (i === 1 && cat === "dowhile"),
          );
        });
        renderStrip();
        loadLevel(0);
      }

      function renderStrip() {
        const lvls = getLevels(),
          ds = done[category];
        document.getElementById("level-strip").innerHTML = lvls
          .map((l, i) => {
            const isDone = ds.has(i);
            const isActive = i === currentIdx;
            /* soal terbuka jika: sudah selesai, sedang aktif, atau soal sebelumnya sudah selesai */
            const unlocked =
              isDone || isActive || (i > 0 && ds.has(i - 1)) || i === 0;
            const cls = [
              "lbtn",
              isActive ? "active" : "",
              isDone ? "done" : "",
              !unlocked ? "locked" : "",
            ]
              .filter(Boolean)
              .join(" ");
            const onclick = unlocked ? `onclick="jumpLevel(${i})"` : "";
            const icon = isDone ? "✓ " : !unlocked ? "🔒 " : "";
            return `<button class="${cls}" ${onclick}>${icon}Soal ${l.id}</button>`;
          })
          .join("");
      }

      function jumpLevel(idx) {
        const ds = done[category];
        /* boleh pindah hanya jika: soal 0, sudah selesai, atau soal sebelumnya selesai */
        const unlocked = idx === 0 || ds.has(idx) || ds.has(idx - 1);
        if (!unlocked) return;
        currentIdx = idx;
        loadLevel(idx);
      }

      function loadLevel(idx) {
        currentIdx = idx;
        const lvl = getCurrent();
        document.getElementById("badge-num").textContent = lvl.id;
        document.getElementById("lvl-title").textContent = lvl.title;
        document.getElementById("lvl-tags").innerHTML = lvl.tags
          .map((t) => `<span class="tag">${t}</span>`)
          .join("");
        document.getElementById("lvl-task").innerHTML = lvl.task;
        const ed = document.getElementById("editor");
        ed.value = lvl.starter;
        ed.className = "code-ed";
        clearOutput();
        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");
        document.getElementById("btn-next").style.display = done[category].has(
          idx,
        )
          ? "flex"
          : "none";
        renderStrip();
        updateProgress();
      }

      function updateProgress() {
        const total = getLevels().length,
          n = done[category].size;
        document.getElementById("prog-fill").style.width =
          (total ? (n / total) * 100 : 0) + "%";
        document.getElementById("prog-label").textContent =
          `${n} / ${total} selesai`;
      }

      function nextLevel() {
        const lvls = getLevels();
        if (currentIdx < lvls.length - 1) {
          loadLevel(currentIdx + 1);
          window.scrollTo({ top: 0, behavior: "smooth" });
        } else {
          document.getElementById("success-bar").innerHTML =
            `🏆 <strong>Semua soal ${category === "while" ? "while loop" : "do...while"} selesai!</strong> Pindah ke kategori lain atau ulangi soal favoritmu.`;
          document.getElementById("success-bar").classList.add("show");
          document.getElementById("btn-next").style.display = "none";
        }
      }

      /* ════════════════════════════════════════════
   RUN
════════════════════════════════════════════ */
      function runCode() {
        const code = document.getElementById("editor").value.trim();
        if (!code) return;

        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");

        if (code.includes("...")) {
          showErr({
            name: "IncompleteCode",
            message: "Masih ada bagian <code>...</code> yang belum diisi.",
            tip: "Ganti semua tanda ... dengan kode JavaScript yang sesuai.",
          });
          setStatus("✗ kode belum lengkap");
          return;
        }

        const outputs = [],
          MAX = 300;
        const sandbox = {
          print: (...a) => {
            outputs.push(a.map(String).join(" "));
          },
        };
        const guarded = guardCode(code, MAX);
        const ed = document.getElementById("editor");

        try {
          new Function(...Object.keys(sandbox), guarded)(
            ...Object.values(sandbox),
          );
        } catch (e) {
          ed.className = "code-ed bad";
          showErr(fmtErr(e));
          setStatus("✗ error");
          return;
        }

        if (!outputs.length) {
          ed.className = "code-ed bad";
          showErr({
            name: "NoOutput",
            message: "Tidak ada output yang dihasilkan.",
            tip: "Pastikan kamu memanggil <code>print()</code> di dalam loop.",
          });
          setStatus("✗ tidak ada output");
          return;
        }

        const lvl = getCurrent();

        /* Tampilkan karakter dulu */
        renderChars(outputs, lvl);

        const passed = lvl.validate(outputs);

        if (passed) {
          ed.className = "code-ed ok";
          setStatus(`✓ ${outputs.length} output — BENAR!`);
          done[category].add(currentIdx);
          document.getElementById("success-bar").innerHTML =
            `✅ ${lvl.successMsg}`;
          document.getElementById("success-bar").classList.add("show");
          document.getElementById("wrong-bar").classList.remove("show");
          document.getElementById("btn-next").style.display =
            currentIdx < getLevels().length - 1 ? "flex" : "none";
          renderStrip();
          updateProgress();
        } else {
          ed.className = "code-ed bad";
          setStatus(`✗ ${outputs.length} output — belum tepat`);
          /* feedback spesifik: bandingkan output vs ekspektasi */
          const wrongFeedback = buildWrongFeedback(outputs, lvl);
          document.getElementById("wrong-bar").innerHTML = wrongFeedback;
          document.getElementById("wrong-bar").classList.add("show");
          document.getElementById("btn-next").style.display = "none";
        }
      }

      function buildWrongFeedback(outputs, lvl) {
        const got = outputs.length;
        const expect = lvl.solution ? lvl.solution.length : "?";

        /* cek jumlah */
        if (got !== expect) {
          return `❌ Output kamu: <strong>${got} baris</strong> — yang diharapkan: <strong>${expect} baris</strong>.<br>
      Periksa nilai awal counter, kondisi loop, dan increment/decrement-mu.`;
        }

        /* jumlah benar, nilai salah */
        const firstWrong = outputs.findIndex(
          (v, i) => lvl.solution && Number(v) !== lvl.solution[i],
        );
        if (firstWrong !== -1 && lvl.solution) {
          return `❌ Jumlah output sudah benar (${got} baris), tapi nilainya belum tepat.<br>
      Output ke-${firstWrong + 1}: kamu menghasilkan <code>${outputs[firstWrong]}</code>, yang diharapkan <code>${lvl.solution[firstWrong]}</code>.<br>
      Cek kembali nilai awal variabelmu.`;
        }

        return `❌ Output belum sesuai. Cek kembali kondisi dan nilai awal loop-mu.`;
      }

      function guardCode(code, max) {
        const g = `if(typeof __lc__==='undefined'){var __lc__=0;}__lc__++;if(__lc__>${max}){throw new RangeError("Loop berjalan lebih dari ${max}x — kemungkinan infinite loop!");}`;
        return code
          .replace(/\bwhile\s*\([^)]*\)\s*\{/g, (m) => m + "\n" + g)
          .replace(/\bdo\s*\{/g, (m) => m + "\n" + g);
      }

      function fmtErr(e) {
        const msg = e.message || String(e);
        let tip = "";
        if (msg.includes("is not defined"))
          tip = "Variabel belum dideklarasikan. Gunakan let atau var.";
        else if (msg.includes("Unexpected") || e instanceof SyntaxError)
          tip = "Periksa penulisan: kurung, kurawal, dan titik koma.";
        else if (msg.includes("lebih dari"))
          tip =
            "Kondisi loop tidak pernah false — pastikan nilai counter berubah.";
        return { name: e.name || "Error", message: msg, tip };
      }

      /* ════════════════════════════════════════════
   OUTPUT RENDER
════════════════════════════════════════════ */
      function renderChars(outputs, lvl) {
        const canvas = document.getElementById("out-canvas");
        canvas.innerHTML = outputs
          .map((val, idx) => {
            const char = lvl.charFn(val, idx);
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;animation:popIn .3s cubic-bezier(.34,1.56,.64,1) ${idx * 80}ms both">
      ${char}
      <span style="font-size:11px;font-family:var(--mono);color:var(--muted)">${lvl.label(val)}</span>
    </div>`;
          })
          .join("");
      }

      function clearOutput() {
        document.getElementById("out-canvas").innerHTML =
          '<div class="empty-state">▷ karakter akan muncul di sini</div>';
        setStatus("— tekan Run untuk melihat output");
      }
      function setStatus(s) {
        document.getElementById("out-status").textContent = s;
      }
      function showErr(err) {
        document.getElementById("out-canvas").innerHTML = `
    <div class="err-panel">
      <div class="err-name">⚠ ${err.name}</div>
      <div>${err.message}</div>
      ${err.tip ? `<div class="err-tip">💡 ${err.tip}</div>` : ""}
    </div>`;
      }

      /* ════════════════════════════════════════════
   CONTROLS
════════════════════════════════════════════ */
      function resetCode() {
        const ed = document.getElementById("editor");
        ed.value = getCurrent().starter;
        ed.className = "code-ed";
        clearOutput();
        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");
      }

      document
        .getElementById("editor")
        .addEventListener("keydown", function (e) {
          if (e.key === "Tab") {
            e.preventDefault();
            const s = this.selectionStart,
              end = this.selectionEnd;
            this.value =
              this.value.substring(0, s) + "  " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = s + 2;
          }
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            e.preventDefault();
            runCode();
          }
        });

      /* BOOT */
      renderStrip();
      loadLevel(0);
    </script>
  </body>
</html>
