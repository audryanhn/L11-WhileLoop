<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop Quest — While & Do While</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fff7f0;
        --bg2: #ffeede;
        --surf: #ffffff;
        --card: #fff3ea;
        --bdr: #ffd9c2;
        --bdr-soft: #ffe6d6;
        --peach: #ff9d76;
        --coral: #ff8a8a;
        --yel: #ffcb66;
        --mint: #7fd8a8;
        --purp: #c7a8f0;
        --blue: #88c8f0;
        --pink: #ffaecf;
        --txt: #5a4a42;
        --txt-soft: #7a6a60;
        --muted: #b3a097;
        --err: #ff7a8a;
        --ui: "Baloo 2", cursive;
        --body: "Nunito", sans-serif;
        --mono: "Fira Code", monospace;
        --r: 14px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--body);
        background: var(--bg);
        background-image:
          radial-gradient(
            circle at 12% 18%,
            rgba(255, 174, 207, 0.16) 0,
            transparent 38%
          ),
          radial-gradient(
            circle at 88% 12%,
            rgba(136, 200, 240, 0.16) 0,
            transparent 36%
          ),
          radial-gradient(
            circle at 50% 95%,
            rgba(199, 168, 240, 0.13) 0,
            transparent 42%
          );
        background-attachment: fixed;
        color: var(--txt);
        padding: 0 12px 80px;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      /* ── DEKORASI PEMANDANGAN ── */
      /* lapisan langit + awan (fixed di belakang konten) */
      .sky-deco {
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        overflow: hidden;
      }
      .cloud {
        position: absolute;
        opacity: 0.85;
        animation: drift linear infinite;
      }
      .cloud.c1 {
        top: 60px;
        left: -160px;
        width: 130px;
        animation-duration: 70s;
      }
      .cloud.c2 {
        top: 140px;
        left: -220px;
        width: 90px;
        animation-duration: 95s;
        animation-delay: -30s;
        opacity: 0.7;
      }
      .cloud.c3 {
        top: 30px;
        left: -200px;
        width: 110px;
        animation-duration: 110s;
        animation-delay: -60s;
        opacity: 0.6;
      }
      @keyframes drift {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(calc(100vw + 260px));
        }
      }

      /* rerumputan + pepohonan menempel di dasar layar */
      .ground-deco {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 150px;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
      }
      .ground-deco svg {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      @media (max-width: 620px) {
        .ground-deco {
          height: 110px;
        }
      }

      /* hiasan buah mengambang di sisi (dekoratif) */
      .float-fruit {
        position: fixed;
        z-index: -1;
        pointer-events: none;
        opacity: 0.55;
        animation: floaty 6s ease-in-out infinite;
      }
      .float-fruit.ff1 {
        top: 180px;
        left: 18px;
        width: 46px;
        animation-delay: 0s;
      }
      .float-fruit.ff2 {
        top: 300px;
        right: 22px;
        width: 40px;
        animation-delay: -2s;
      }
      .float-fruit.ff3 {
        top: 460px;
        left: 30px;
        width: 38px;
        animation-delay: -4s;
      }
      .float-fruit.ff4 {
        top: 560px;
        right: 28px;
        width: 44px;
        animation-delay: -1.5s;
      }
      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0) rotate(-4deg);
        }
        50% {
          transform: translateY(-14px) rotate(4deg);
        }
      }
      @media (max-width: 880px) {
        .float-fruit {
          display: none;
        }
      }

      /* keranjang buah di header */
      .header-baskets {
        max-width: 860px;
        margin: 14px auto 0;
        display: flex;
        justify-content: center;
        gap: 26px;
        flex-wrap: wrap;
      }
      .header-baskets .basket-wrap {
        animation: bob 3s ease-in-out infinite;
      }
      .header-baskets .basket-wrap:nth-child(2) {
        animation-delay: -1s;
      }
      .header-baskets .basket-wrap:nth-child(3) {
        animation-delay: -2s;
      }

      /* ── TOMBOL GANTI BAHASA ── */
      .lang-toggle {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 50;
        display: flex;
        background: var(--surf);
        border: 2.5px solid var(--bdr);
        border-radius: 99px;
        padding: 3px;
        box-shadow: 0 3px 0 var(--bdr-soft);
      }
      .lang-toggle button {
        font-family: var(--ui);
        font-size: 13px;
        font-weight: 700;
        padding: 5px 13px;
        border: none;
        border-radius: 99px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.18s;
      }
      .lang-toggle button.active {
        background: linear-gradient(135deg, var(--peach), var(--yel));
        color: #fff;
        box-shadow: 0 2px 0 rgba(255, 157, 118, 0.35);
      }
      .lang-toggle button:not(.active):hover {
        color: var(--txt);
      }
      @media (max-width: 620px) {
        .lang-toggle {
          top: 10px;
          right: 10px;
        }
        .lang-toggle button {
          padding: 4px 10px;
          font-size: 12px;
        }
      }

      /* ── HEADER ── */
      .site-header {
        max-width: 860px;
        margin: 0 auto;
        padding: 30px 0 10px;
        text-align: center;
      }
      .eyebrow {
        font-family: var(--ui);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--peach);
        margin-bottom: 4px;
      }
      .site-header h1 {
        font-family: var(--ui);
        font-size: clamp(26px, 4.5vw, 40px);
        font-weight: 800;
        line-height: 1.1;
        color: var(--txt);
      }
      .site-header h1 em {
        color: var(--peach);
        font-style: normal;
      }
      .site-header p {
        color: var(--txt-soft);
        font-size: 14px;
        font-weight: 600;
        margin-top: 8px;
      }

      /* ── CATEGORY TABS ── */
      .cat-tabs {
        max-width: 860px;
        margin: 22px auto 0;
        display: flex;
        gap: 10px;
      }
      .cat-tab {
        flex: 1;
        padding: 12px 0;
        border: 2.5px solid var(--bdr);
        border-radius: var(--r);
        background: var(--surf);
        color: var(--muted);
        font-family: var(--ui);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        box-shadow: 0 3px 0 var(--bdr-soft);
      }
      .cat-tab:hover {
        border-color: var(--purp);
        color: var(--txt);
        transform: translateY(-1px);
      }
      .cat-tab.active {
        border-color: var(--peach);
        color: var(--peach);
        background: #fff1e8;
        box-shadow: 0 3px 0 var(--bdr);
      }

      /* ── LEVEL STRIP ── */
      .level-strip {
        max-width: 860px;
        margin: 14px auto 0;
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
      }
      .lbtn {
        padding: 6px 16px;
        border-radius: 99px;
        border: 2px solid var(--bdr);
        background: var(--surf);
        color: var(--muted);
        font-family: var(--ui);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }
      .lbtn:hover {
        border-color: var(--purp);
        color: var(--txt);
        transform: translateY(-1px);
      }
      .lbtn.active {
        border-color: var(--peach);
        color: var(--peach);
        background: #fff1e8;
      }
      .lbtn.done {
        border-color: var(--mint);
        color: #fff;
        background: var(--mint);
      }
      .lbtn.locked {
        border-color: var(--bdr-soft);
        color: #d8c8be;
        cursor: not-allowed;
        opacity: 0.7;
        background: var(--bg2);
      }
      .lbtn.locked:hover {
        border-color: var(--bdr-soft);
        color: #d8c8be;
        transform: none;
      }

      /* ── PROGRESS ── */
      .progress-row {
        max-width: 860px;
        margin: 12px auto 0;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .prog-bar {
        flex: 1;
        height: 8px;
        background: var(--bdr-soft);
        border-radius: 99px;
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--peach), var(--yel));
        transition: width 0.4s;
        border-radius: 99px;
      }
      .prog-label {
        font-family: var(--ui);
        font-size: 13px;
        font-weight: 600;
        color: var(--txt-soft);
        white-space: nowrap;
      }

      /* ── MAIN 2-COL ── */
      .main-wrap {
        max-width: 860px;
        margin: 16px auto 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 620px) {
        .main-wrap {
          grid-template-columns: 1fr;
        }
      }

      /* ── PANEL ── */
      .panel {
        background: var(--surf);
        border: 2.5px solid var(--bdr);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 4px 0 var(--bdr-soft);
      }
      .panel-head {
        padding: 10px 14px;
        border-bottom: 2px solid var(--bdr-soft);
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--card);
      }
      .circles {
        display: flex;
        gap: 5px;
      }
      .c {
        width: 11px;
        height: 11px;
        border-radius: 50%;
      }
      .cr {
        background: #ff8a8a;
      }
      .cy {
        background: #ffcb66;
      }
      .cg {
        background: #7fd8a8;
      }
      .panel-head span {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-left: 3px;
      }

      /* ── SOAL ── */
      .soal-body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .badge-row {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .badge {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        flex-shrink: 0;
        background: linear-gradient(135deg, var(--peach), var(--yel));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--ui);
        font-weight: 800;
        font-size: 18px;
        color: #fff;
        box-shadow: 0 3px 0 rgba(255, 157, 118, 0.4);
      }
      .level-meta h2 {
        font-family: var(--ui);
        font-size: 17px;
        font-weight: 700;
        line-height: 1.2;
        color: var(--txt);
      }
      .tag-row {
        display: flex;
        gap: 5px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .tag {
        font-family: var(--ui);
        font-size: 11px;
        font-weight: 700;
        padding: 2px 9px;
        border-radius: 99px;
        background: #eaf4fd;
        color: var(--blue);
      }
      .task-box {
        background: var(--card);
        border: 2px solid var(--bdr-soft);
        border-radius: var(--r);
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.75;
        color: var(--txt-soft);
      }
      .task-box code {
        background: #fff;
        border: 1px solid var(--bdr);
        padding: 1px 6px;
        border-radius: 5px;
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--peach);
      }
      .task-lbl {
        font-family: var(--ui);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--yel);
        margin-bottom: 7px;
      }

      /* ── EDITOR ── */
      .editor-body {
        padding: 12px 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 11px;
      }
      textarea.code-ed {
        width: 100%;
        height: 200px;
        padding: 14px;
        background: var(--card);
        border: 2px solid var(--bdr);
        border-radius: var(--r);
        color: var(--txt);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.7;
        resize: none;
        overflow-y: auto;
        outline: none;
        transition: border-color 0.2s;
        tab-size: 2;
      }
      textarea.code-ed:focus {
        border-color: var(--peach);
      }
      textarea.code-ed.ok {
        border-color: var(--mint);
        background: #f3fcf7;
      }
      textarea.code-ed.bad {
        border-color: var(--err);
        background: #fff4f5;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        font-family: var(--ui);
        font-size: 14px;
        font-weight: 700;
        padding: 8px 20px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: all 0.15s;
      }
      .btn-run {
        background: var(--peach);
        color: #fff;
        box-shadow: 0 3px 0 #e8825f;
      }
      .btn-run:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }
      .btn-run:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #e8825f;
      }
      .btn-reset {
        background: var(--surf);
        color: var(--txt-soft);
        border: 2px solid var(--bdr);
      }
      .btn-reset:hover {
        color: var(--txt);
        border-color: var(--muted);
      }
      .btn-next {
        background: var(--mint);
        color: #fff;
        margin-left: auto;
        box-shadow: 0 3px 0 #5fc08c;
      }
      .btn-next:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }
      .btn-next:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #5fc08c;
      }
      .shortcut-tip {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
      }

      /* ── OUTPUT AREA ── */
      .output-wrap {
        max-width: 860px;
        margin: 16px auto 0;
        background: var(--surf);
        border: 2.5px solid var(--bdr);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 4px 0 var(--bdr-soft);
      }
      .output-head {
        padding: 10px 14px;
        border-bottom: 2px solid var(--bdr-soft);
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--card);
      }
      .out-status {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-left: 4px;
      }
      .output-canvas {
        min-height: 170px;
        padding: 18px 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-end;
        justify-content: flex-start;
        overflow-x: auto;
      }
      .empty-state {
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
        font-family: var(--ui);
        margin: auto;
      }

      /* ── CHAR CARD ── */
      .char-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .char-card .char-label {
        font-size: 12px;
        font-family: var(--ui);
        font-weight: 700;
        color: var(--txt-soft);
      }
      @keyframes popIn {
        from {
          transform: scale(0.4) translateY(16px);
          opacity: 0;
        }
        to {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
      .char-card svg {
        animation: bob 2.4s ease-in-out infinite;
      }

      /* ── ERROR ── */
      .err-panel {
        padding: 16px 18px;
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--err);
        line-height: 1.8;
      }
      .err-panel .err-name {
        font-family: var(--ui);
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 3px;
      }
      .err-panel .err-tip {
        color: #d4677a;
        margin-top: 6px;
        font-size: 12.5px;
        font-weight: 600;
        font-family: var(--body);
      }

      /* ── SUCCESS ── */
      .success-bar {
        display: none;
        max-width: 860px;
        margin: 14px auto 0;
        background: #f0fbf5;
        border: 2px solid #b8ecd0;
        border-radius: var(--r);
        padding: 14px 18px;
        font-size: 14px;
        font-weight: 600;
        color: #3fa873;
        line-height: 1.6;
      }
      .success-bar code {
        background: #fff;
        border: 1px solid #b8ecd0;
        padding: 1px 6px;
        border-radius: 5px;
        font-family: var(--mono);
        font-size: 12px;
      }
      .success-bar.show {
        display: block;
      }

      /* ── WRONG ANSWER FEEDBACK ── */
      .wrong-bar {
        display: none;
        max-width: 860px;
        margin: 12px auto 0;
        background: #fff4f5;
        border: 2px solid #ffd0d8;
        border-radius: var(--r);
        padding: 13px 18px;
        font-size: 13.5px;
        font-weight: 600;
        color: #d4677a;
        line-height: 1.6;
      }
      .wrong-bar code {
        background: #fff;
        border: 1px solid #ffd0d8;
        padding: 1px 6px;
        border-radius: 5px;
        font-family: var(--mono);
        font-size: 12px;
      }
      .wrong-bar.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- ░░ TOMBOL GANTI BAHASA ░░ -->
    <div class="lang-toggle" role="group" aria-label="Language">
      <button id="lang-id" class="active" onclick="setLang('id')">ID</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>

    <!-- ░░ DEKORASI LANGIT & AWAN ░░ -->
    <div class="sky-deco" aria-hidden="true">
      <svg
        class="cloud c1"
        viewBox="0 0 120 60"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g fill="#ffffff">
          <ellipse cx="40" cy="40" rx="34" ry="18" />
          <circle cx="40" cy="30" r="20" />
          <circle cx="65" cy="34" r="16" />
          <circle cx="22" cy="36" r="14" />
        </g>
      </svg>
      <svg
        class="cloud c2"
        viewBox="0 0 120 60"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g fill="#ffffff">
          <ellipse cx="40" cy="40" rx="34" ry="18" />
          <circle cx="40" cy="30" r="20" />
          <circle cx="65" cy="34" r="16" />
          <circle cx="22" cy="36" r="14" />
        </g>
      </svg>
      <svg
        class="cloud c3"
        viewBox="0 0 120 60"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g fill="#ffffff">
          <ellipse cx="40" cy="40" rx="34" ry="18" />
          <circle cx="40" cy="30" r="20" />
          <circle cx="65" cy="34" r="16" />
          <circle cx="22" cy="36" r="14" />
        </g>
      </svg>
    </div>

    <!-- ░░ BUAH MENGAMBANG (SISI) ░░ -->
    <svg
      class="float-fruit ff1"
      viewBox="0 0 74 86"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <ellipse
        cx="42"
        cy="20"
        rx="8"
        ry="4"
        fill="#7fc88a"
        transform="rotate(20 42 20)"
      />
      <circle cx="37" cy="52" r="28" fill="#ffb05c" />
      <ellipse cx="26" cy="42" rx="5" ry="7" fill="#fff" opacity="0.3" />
    </svg>
    <svg
      class="float-fruit ff2"
      viewBox="0 0 74 86"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <ellipse
        cx="48"
        cy="11"
        rx="7"
        ry="4"
        fill="#7fc88a"
        transform="rotate(-20 48 11)"
      />
      <circle cx="26" cy="40" r="9" fill="#b88ae8" />
      <circle cx="48" cy="40" r="9" fill="#b88ae8" />
      <circle cx="37" cy="38" r="9" fill="#c79df0" />
      <circle cx="37" cy="56" r="10" fill="#b88ae8" />
    </svg>

      /* helper warna sederhana */
      function darken(hex) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.max(0, r - 40)},${Math.max(0, g - 40)},${Math.max(0, b - 40)})`;
      }
      function lighten(hex) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.min(255, r + 35)},${Math.min(255, g + 35)},${Math.min(255, b + 35)})`;
      }
      function hexToRgb(hex) {
        const m = hex.replace("#", "").match(/.{2}/g);
        return m ? m.map((x) => parseInt(x, 16)) : [255, 200, 150];
      }

      /* wajah lucu standar (mata + pipi + senyum) */

  <circle cx="${cx - 7}" cy="${cy - 1}" r="1" fill="#fff"/>
  <circle cx="${cx + 8}" cy="${cy}" r="3.2" fill="${eyeColor}"/>
  <circle cx="${cx + 9}" cy="${cy - 1}" r="1" fill="#fff"/>
  <ellipse cx="${cx - 12}" cy="${cy + 5}" rx="3" ry="2" fill="#ff9eb5" opacity="0.55"/>
  <ellipse cx="${cx + 12}" cy="${cy + 5}" rx="3" ry="2" fill="#ff9eb5" opacity="0.55"/>
  <path d="M${cx - 5} ${cy + 5} Q${cx} ${cy + 10} ${cx + 5} ${cy + 5}" fill="none" stroke="${eyeColor}" stroke-width="1.6" stroke-linecap="round"/>`;
      }

      const APPLE_COLORS = ["#ff8a8a", "#ff7a7a", "#ffb05c", "#ff9d6c"];
      const ORANGE_COLORS = ["#ffb05c", "#ffa04c", "#ffc266", "#ff9d4c"];

      /* daftar generator buah untuk variasi acak-stabil */
      const FRUITS = [
        (col, d) => svgApple(col, d),
        (col, d) => svgOrange(col, d),
        (col, d) => svgStrawberry(col, d),
        (col, d) => svgGrape(col, d),
        (col, d) => svgLemon(col, d),
        (col, d) => svgPear(col, d),
        (col, d) => svgPeach(col, d),
        (col, d) => svgWatermelon(col, d),

        "#ff8a8a",
        "#ffb05c",
        "#ff7a9c",
        "#b88ae8",
        "#ffd966",
        "#a8d86a",
        "#ffb38a",
        "#ff8a8a",
      ];
      function fruitByIdx(idx, delay) {
        const k = idx % FRUITS.length;
        return FRUITS[k](FRUIT_DEFAULT[k], delay);
      }

════════════════════════════════════════════ */

      function L(field) {
        if (field && typeof field === "object" && !Array.isArray(field)) {
          return field[lang] !== undefined ? field[lang] : field.id;
        }
        return field;

      let category = "while";
      let currentIdx = 0;
      let done = { while: new Set(), dowhile: new Set() };

      function getLevels() {
        return category === "while" ? WHILE_LEVELS : DOWHILE_LEVELS;
      }
      function getCurrent() {
        return getLevels()[currentIdx];
      }

      function setCategory(cat) {
        category = cat;
        currentIdx = 0;
        document.querySelectorAll(".cat-tab").forEach((t, i) => {
          t.classList.toggle(
            "active",
            (i === 0 && cat === "while") || (i === 1 && cat === "dowhile"),
          );
        });
        document.getElementById("ui-title").innerHTML = L(UI.titleHTML[cat]);
        renderStrip();
        loadLevel(0);
      }

      /* ════════════════════════════════════════════
   GANTI BAHASA
════════════════════════════════════════════ */
      function applyStaticLang() {
        document.getElementById("ui-eyebrow").textContent = L(UI.eyebrow);
        document.getElementById("ui-title").innerHTML = L(
          UI.titleHTML[category],
        );
        document.getElementById("ui-desc").innerHTML = L(UI.descHTML);
        document.getElementById("tab-while").innerHTML = L(UI.tabWhile);
        document.getElementById("tab-dowhile").innerHTML = L(UI.tabDowhile);
        document.getElementById("file-soal").textContent = L(UI.fileSoal);
        document.getElementById("file-jawaban").textContent = L(UI.fileJawaban);
        document.getElementById("ui-task-lbl").textContent = L(UI.taskLbl);
        document.getElementById("btn-run").innerHTML = L(UI.btnRun);
        document.getElementById("btn-reset").innerHTML = L(UI.btnReset);
        document.getElementById("btn-next").innerHTML = L(UI.btnNext);
      }

      function setLang(l) {
        if (l === lang) return;
        lang = l;
        document
          .getElementById("lang-id")
          .classList.toggle("active", l === "id");
        document
          .getElementById("lang-en")
          .classList.toggle("active", l === "en");

        applyStaticLang();

        /* segarkan teks soal TANPA mereset editor siswa */
        const lvl = getCurrent();
        document.getElementById("lvl-title").textContent = L(lvl.title);
        document.getElementById("lvl-tags").innerHTML = L(lvl.tags)
          .map((t) => `<span class="tag">${t}</span>`)
          .join("");
        document.getElementById("lvl-task").innerHTML = L(lvl.task);

        /* jika pesan sukses sedang tampil, terjemahkan ulang */
        const sb = document.getElementById("success-bar");
        if (sb.classList.contains("show")) {
          sb.innerHTML = `✅ ${L(lvl.successMsg)}`;
        }
        /* feedback salah bersifat dinamis — sembunyikan agar tidak basi */
        document.getElementById("wrong-bar").classList.remove("show");

        /* jika output masih placeholder, segarkan teksnya */
        const canvas = document.getElementById("out-canvas");
        if (canvas.querySelector(".empty-state")) {
          canvas.innerHTML = `<div class="empty-state">${L(UI.emptyState)}</div>`;
          setStatus(L(UI.statusIdle));
        }

        renderStrip();
        updateProgress();
      }

      function renderStrip() {
        const lvls = getLevels(),
          ds = done[category];
        document.getElementById("level-strip").innerHTML = lvls
          .map((l, i) => {
            const isDone = ds.has(i);
            const isActive = i === currentIdx;
            /* soal terbuka jika: sudah selesai, sedang aktif, atau soal sebelumnya sudah selesai */
            const unlocked =
              isDone || isActive || (i > 0 && ds.has(i - 1)) || i === 0;
            const cls = [
              "lbtn",
              isActive ? "active" : "",
              isDone ? "done" : "",
              !unlocked ? "locked" : "",
            ]
              .filter(Boolean)
              .join(" ");
            const onclick = unlocked ? `onclick="jumpLevel(${i})"` : "";
            const icon = isDone ? "✓ " : !unlocked ? "🔒 " : "";
            return `<button class="${cls}" ${onclick}>${icon}${L(UI.problemWord)} ${l.id}</button>`;
          })
          .join("");
      }

      function jumpLevel(idx) {
        const ds = done[category];
        /* boleh pindah hanya jika: soal 0, sudah selesai, atau soal sebelumnya selesai */
        const unlocked = idx === 0 || ds.has(idx) || ds.has(idx - 1);
        if (!unlocked) return;
        currentIdx = idx;
        loadLevel(idx);
      }

      function loadLevel(idx) {
        currentIdx = idx;
        const lvl = getCurrent();
        document.getElementById("badge-num").textContent = lvl.id;
        document.getElementById("lvl-title").textContent = L(lvl.title);
        document.getElementById("lvl-tags").innerHTML = L(lvl.tags)
          .map((t) => `<span class="tag">${t}</span>`)
          .join("");
        document.getElementById("lvl-task").innerHTML = L(lvl.task);
        const ed = document.getElementById("editor");
        ed.value = lvl.starter;
        ed.className = "code-ed";
        clearOutput();
        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");
        document.getElementById("btn-next").style.display = done[category].has(
          idx,
        )
          ? "flex"
          : "none";
        renderStrip();
        updateProgress();
      }

      function updateProgress() {
        const total = getLevels().length,
          n = done[category].size;
        document.getElementById("prog-fill").style.width =
          (total ? (n / total) * 100 : 0) + "%";
        document.getElementById("prog-label").textContent = UI.doneLabel(
          n,
          total,
        );
      }

      function nextLevel() {
        const lvls = getLevels();
        if (currentIdx < lvls.length - 1) {
          loadLevel(currentIdx + 1);
          window.scrollTo({ top: 0, behavior: "smooth" });
        } else {
          const catName = category === "while" ? "while loop" : "do...while";
          document.getElementById("success-bar").innerHTML =
            UI.allDone(catName);
          document.getElementById("success-bar").classList.add("show");
          document.getElementById("btn-next").style.display = "none";
        }
      }

      /* ════════════════════════════════════════════
   RUN
════════════════════════════════════════════ */
      function runCode() {
        const code = document.getElementById("editor").value.trim();
        if (!code) return;

        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");

        if (code.includes("...")) {
          showErr({
            name: "IncompleteCode",
            message: L(UI.incompleteMsg),
            tip: L(UI.incompleteTip),
          });
          setStatus(L(UI.statusIncomplete));
          return;
        }

        const outputs = [],
          MAX = 300;
        const sandbox = {
          print: (...a) => {
            outputs.push(a.map(String).join(" "));
          },
        };
        const guarded = guardCode(code, MAX);
        const ed = document.getElementById("editor");

        try {
          new Function(...Object.keys(sandbox), guarded)(
            ...Object.values(sandbox),
          );
        } catch (e) {
          ed.className = "code-ed bad";
          showErr(fmtErr(e));
          setStatus(L(UI.statusError));
          return;
        }

        if (!outputs.length) {
          ed.className = "code-ed bad";
          showErr({
            name: "NoOutput",
            message: L(UI.noOutputMsg),
            tip: L(UI.noOutputTip),
          });
          setStatus(L(UI.statusNoOutput));
          return;
        }

        const lvl = getCurrent();

        /* Tampilkan karakter dulu */
        renderChars(outputs, lvl);

        const passed = lvl.validate(outputs);

        if (passed) {
          ed.className = "code-ed ok";
          setStatus(UI.statusCorrect(outputs.length));
          done[category].add(currentIdx);
          document.getElementById("success-bar").innerHTML =
            `✅ ${L(lvl.successMsg)}`;
          document.getElementById("success-bar").classList.add("show");
          document.getElementById("wrong-bar").classList.remove("show");
          document.getElementById("btn-next").style.display =
            currentIdx < getLevels().length - 1 ? "flex" : "none";
          renderStrip();
          updateProgress();
        } else {
          ed.className = "code-ed bad";
          setStatus(UI.statusWrong(outputs.length));
          /* feedback spesifik: bandingkan output vs ekspektasi */
          const wrongFeedback = buildWrongFeedback(outputs, lvl);
          document.getElementById("wrong-bar").innerHTML = wrongFeedback;
          document.getElementById("wrong-bar").classList.add("show");
          document.getElementById("btn-next").style.display = "none";
        }
      }

      function buildWrongFeedback(outputs, lvl) {
        const got = outputs.length;
        const expect = lvl.solution ? lvl.solution.length : "?";

        /* cek jumlah */
        if (got !== expect) {
          return UI.fbCount(got, expect);
        }

        /* jumlah benar, nilai salah */
        const firstWrong = outputs.findIndex(
          (v, i) => lvl.solution && Number(v) !== lvl.solution[i],
        );
        if (firstWrong !== -1 && lvl.solution) {
          return UI.fbValue(
            got,
            firstWrong + 1,
            outputs[firstWrong],
            lvl.solution[firstWrong],
          );
        }

        return L(UI.fbGeneric);
      }

      function guardCode(code, max) {
        const g = `if(typeof __lc__==='undefined'){var __lc__=0;}__lc__++;if(__lc__>${max}){throw new RangeError(${JSON.stringify(UI.guardMsg(max))});}`;
        return code
          .replace(/\bwhile\s*\([^)]*\)\s*\{/g, (m) => m + "\n" + g)
          .replace(/\bdo\s*\{/g, (m) => m + "\n" + g);
      }

      function fmtErr(e) {
        const msg = e.message || String(e);
        let tip = "";
        if (msg.includes("is not defined")) tip = L(UI.tipNotDefined);
        else if (msg.includes("Unexpected") || e instanceof SyntaxError)
          tip = L(UI.tipSyntax);
        else if (/infinite/i.test(msg)) tip = L(UI.tipInfinite);
        return { name: e.name || "Error", message: msg, tip };
      }

      /* ════════════════════════════════════════════
   OUTPUT RENDER
════════════════════════════════════════════ */
      function renderChars(outputs, lvl) {
        const canvas = document.getElementById("out-canvas");
        canvas.innerHTML = outputs
          .map((val, idx) => {
            const char = lvl.charFn(val, idx);
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;animation:popIn .3s cubic-bezier(.34,1.56,.64,1) ${idx * 80}ms both">
      ${char}
      <span style="font-size:12px;font-family:var(--ui);font-weight:700;color:var(--txt-soft)">${lvl.label(val)}</span>
    </div>`;
          })
          .join("");
      }

      function clearOutput() {
        document.getElementById("out-canvas").innerHTML =
          `<div class="empty-state">${L(UI.emptyState)}</div>`;
        setStatus(L(UI.statusIdle));
      }
      function setStatus(s) {
        document.getElementById("out-status").textContent = s;
      }
      function showErr(err) {
        document.getElementById("out-canvas").innerHTML = `
    <div class="err-panel">
      <div class="err-name">⚠ ${err.name}</div>
      <div>${err.message}</div>
      ${err.tip ? `<div class="err-tip">💡 ${err.tip}</div>` : ""}
    </div>`;
      }

      /* ════════════════════════════════════════════
   CONTROLS
════════════════════════════════════════════ */
      function resetCode() {
        const ed = document.getElementById("editor");
        ed.value = getCurrent().starter;
        ed.className = "code-ed";
        clearOutput();
        document.getElementById("success-bar").classList.remove("show");
        document.getElementById("wrong-bar").classList.remove("show");
      }

      document
        .getElementById("editor")
        .addEventListener("keydown", function (e) {
          if (e.key === "Tab") {
            e.preventDefault();
            const s = this.selectionStart,
              end = this.selectionEnd;
            this.value =
              this.value.substring(0, s) + "  " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = s + 2;
          }
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            e.preventDefault();
            runCode();
          }
        });

      /* BOOT */
      applyStaticLang();
      renderStrip();
      loadLevel(0);
    </script>
